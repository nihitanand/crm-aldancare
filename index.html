const uid   = () => Math.random().toString(36).slice(2,9);
const inr   = (n) => "₹"+Number(n||0).toLocaleString("en-IN");
const inrL  = (n) => (n/100000).toFixed(2)+"L";
const toArr = (v) => { if(!v)return[]; if(Array.isArray(v))return v.filter(Boolean); if(typeof v==="object")return Object.values(v).filter(Boolean); return[]; };
const now   = () => new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});
const curMonth = () => MONTHS[new Date().getMonth()];

/* ══════════════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════════════ */
function App() {
  const [user,     setUser]     = useState(null); // {email, role}
  const [view,     setView]     = useState("dashboard");
  const [proposals,setProposals]= useState({}); // keyed by proposalId
  const [loaded,   setLoaded]   = useState(false);
  const [syncSt,   setSyncSt]   = useState("connecting");
  const [toast,    setToast]    = useState(null);
  const [modal,    setModal]    = useState(null);
  const [confirm,  setConfirm]  = useState(null);
  // Login state
  const [loginEmail, setLoginEmail] = useState("");
  const [loginPwd,   setLoginPwd]   = useState("");
  const [loginErr,   setLoginErr]   = useState("");

  /* ── Firebase listener ── */
  useEffect(() => {
    const ref = DB.ref(DB_PATH+"/proposals");
    ref.on("value", snap => {
      const raw = snap.val();
      setProposals(raw || {});
      setLoaded(true);
      setSyncSt("synced");
    }, () => { setSyncSt("error"); setLoaded(true); });
    return () => ref.off();
  }, []);

  const save = (path, data) => {
    setSyncSt("saving");
    DB.ref(DB_PATH+"/proposals/"+path).set(data)
      .then(()=>setSyncSt("synced"))
      .catch(()=>setSyncSt("error"));
  };
  const saveAll = (data) => {
    setSyncSt("saving");
    DB.ref(DB_PATH+"/proposals").set(data)
      .then(()=>setSyncSt("synced"))
      .catch(()=>setSyncSt("error"));
  };

  const notify = (msg, c="green") => { setToast({msg,c}); setTimeout(()=>setToast(null),2800); };
  const close  = () => setModal(null);

  /* ── Auth ── */
  const login = () => {
    const role = CREDS[loginEmail.trim().toLowerCase()];
    if (!role || loginPwd !== "aldan") { setLoginErr("Invalid credentials"); return; }
    setUser({email:loginEmail.trim().toLowerCase(), role});
    setLoginErr("");
  };
  const logout = () => { setUser(null); setView("dashboard"); };

  /* ── Proposal helpers ── */
  const proposalList = useMemo(() => toArr(Object.values(proposals)), [proposals]);
  
  const myProposals = useMemo(() => {
    if (!user) return [];
    return proposalList.filter(p => p.proposedBy === user.email);
  }, [proposalList, user]);

  const addProposal = (doctorKey, entries, month) => {
    // entries: array of {proposed, issued}
    const existing = Object.values(proposals).find(p =>
      p.doctorKey === doctorKey && p.month === month
    );
    if (existing) {
      save(existing.id, {...existing, entries, updatedAt:now()});
    } else {
      const id = uid();
      save(id, {
        id, doctorKey, month,
        entries,           // [{proposed, issued}]  — issued defaults to proposed
        status: STATUSES.PROPOSED,
        proposedBy: user.email,
        proposedAt: now(),
        updatedAt: now()
      });
    }
    notify("Proposal saved!");
  };

  const approveProposal = (pid) => {
    const p = proposals[pid];
    if (!p) return;
    save(pid, {...p, status:STATUSES.APPROVED, approvedBy:user.email, approvedAt:now(), updatedAt:now()});
    notify("Approved!");
  };

  const confirmProposal = (pid, issuedEntries) => {
    const p = proposals[pid];
    if (!p) return;
    save(pid, {...p, status:STATUSES.CONFIRMED, issuedEntries, confirmedBy:user.email, confirmedAt:now(), updatedAt:now()});
    notify("Confirmed & Issued!");
  };

  const rejectProposal = (pid) => {
    const p = proposals[pid];
    if (!p) return;
    save(pid, {...p, status:STATUSES.PROPOSED, approvedBy:null, approvedAt:null, updatedAt:now()});
    notify("Reverted to Proposed","amber");
  };

  /* ── Compute stats ── */
  const stats = useMemo(() => {
    // Per HQ aggregation for tracker
    const hqStats = {};
    HQ_LIST.forEach(hq => {
      hqStats[hq] = { plan:HQ_PLAN[hq], proposed:0, approved:0, confirmed:0 };
    });
    proposalList.forEach(p => {
      const doc = DOCTOR_MASTER.find(d => d.name+"___"+d.hq === p.doctorKey);
      if (!doc) return;
      const proposed = (p.entries||[]).reduce((s,e)=>s+Number(e.proposed||0),0);
      const approved = (p.entries||[]).reduce((s,e)=>s+Number(e.proposed||0),0);
      const issued   = (p.issuedEntries||p.entries||[]).reduce((s,e)=>s+Number(e.issued||e.proposed||0),0);
      if (!hqStats[doc.hq]) return;
      if (p.status===STATUSES.PROPOSED || p.status===STATUSES.APPROVED || p.status===STATUSES.CONFIRMED)
        hqStats[doc.hq].proposed += proposed;
      if (p.status===STATUSES.APPROVED || p.status===STATUSES.CONFIRMED)
        hqStats[doc.hq].approved += approved;
      if (p.status===STATUSES.CONFIRMED)
        hqStats[doc.hq].confirmed += issued;
    });
    return hqStats;
  }, [proposalList]);

  const biharStats = useMemo(() => ({
    proposed: Object.values(stats).reduce((s,v)=>s+v.proposed,0),
    approved: Object.values(stats).reduce((s,v)=>s+v.approved,0),
    confirmed: Object.values(stats).reduce((s,v)=>s+v.confirmed,0),
  }), [stats]);

  /* ══════════════ LOGIN SCREEN ══════════════ */
  if (!user) return (
    <div className="min-h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 flex items-center justify-center px-4">
      <div className="w-full max-w-sm">
        <div className="text-center mb-8">
          <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-600 shadow-xl mb-4">
            <span className="text-2xl">💊</span>
          </div>
          <h1 className="text-2xl font-black text-white">Aldan Healthcare</h1>
          <p className="text-blue-300 text-sm mt-1">CRM 26 – Bihar Region</p>
        </div>
        <div className="bg-white/10 backdrop-blur rounded-2xl p-6 shadow-2xl border border-white/10">
          <div className="space-y-3 mb-4">
            <div>
              <label className="text-xs font-bold text-blue-200 uppercase tracking-widest block mb-1.5">Email</label>
              <input value={loginEmail} onChange={e=>{setLoginEmail(e.target.value);setLoginErr("");}}
                onKeyDown={e=>e.key==="Enter"&&login()}
                placeholder="zsm@aldan or admin@aldan"
                className="w-full px-4 py-2.5 rounded-xl bg-white/15 border border-white/20 text-white placeholder-white/30 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
            </div>
            <div>
              <label className="text-xs font-bold text-blue-200 uppercase tracking-widest block mb-1.5">Password</label>
              <input type="password" value={loginPwd} onChange={e=>{setLoginPwd(e.target.value);setLoginErr("");}}
                onKeyDown={e=>e.key==="Enter"&&login()}
                placeholder="••••••"
                className="w-full px-4 py-2.5 rounded-xl bg-white/15 border border-white/20 text-white placeholder-white/30 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
            </div>
          </div>
          {loginErr && <p className="text-red-300 text-xs mb-3 font-semibold">{loginErr}</p>}
          <button onClick={login} className="w-full py-2.5 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl text-sm transition-colors">
            Sign In →
          </button>
          <p className="text-white/20 text-xs text-center mt-4">Password: aldan</p>
        </div>
      </div>
    </div>
  );

  /* ══════════════ LOADING ══════════════ */
  if (!loaded) return (
    <div className="min-h-screen flex items-center justify-center bg-slate-50">
      <div className="text-center">
        <div className="text-4xl animate-bounce mb-3">💊</div>
        <p className="font-bold text-slate-500">Loading CRM data…</p>
      </div>
    </div>
  );

  /* ══════════════ MAIN SHELL ══════════════ */
  const isZSM   = user.role === "zsm";
  const isAdmin = user.role === "admin";

  const navItems = isZSM
    ? [["dashboard","📊 Dashboard"],["propose","➕ Propose"],["myproposals","📋 My Proposals"]]
    : [["dashboard","📊 Dashboard"],["approve","✅ Approve"],["tracker","📈 Tracker"]];

  return (
    <div className="min-h-screen bg-slate-50">
      {/* Toast */}
      {toast && (
        <div className={`fixed top-4 right-4 z-[200] px-4 py-2.5 rounded-xl text-white text-sm font-bold shadow-xl
          ${toast.c==="green"?"bg-emerald-500":toast.c==="red"?"bg-red-500":toast.c==="amber"?"bg-amber-500":"bg-blue-500"}`}>
          {toast.msg}
        </div>
      )}

      {/* Confirm */}
      {confirm && (
        <div className="fixed inset-0 z-[150] flex items-center justify-center p-4" style={{background:"rgba(15,23,42,0.6)"}}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
            <p className="text-center font-semibold text-slate-700 mb-5">{confirm.msg}</p>
            <div className="flex gap-3">
              <button onClick={()=>setConfirm(null)} className="flex-1 py-2.5 bg-slate-100 rounded-xl text-sm font-bold text-slate-600">Cancel</button>
              <button onClick={()=>{confirm.onOk();setConfirm(null);}} className="flex-1 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-bold">{confirm.okLabel||"Confirm"}</button>
            </div>
          </div>
        </div>
      )}

      {/* NAV */}
      <nav className="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
        <div className="max-w-7xl mx-auto px-4">
          <div className="flex items-center justify-between h-14">
            <div className="flex items-center gap-3">
              <span className="text-lg font-black text-blue-700">💊 CRM 26</span>
              <span className="text-slate-300 hidden sm:inline">|</span>
              <span className="text-xs text-slate-400 hidden sm:inline font-semibold">Bihar · {isZSM?"ZSM":"Admin"}</span>
            </div>
            <div className="flex items-center gap-1">
              {navItems.map(([v,l]) => (
                <button key={v} onClick={()=>setView(v)}
                  className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors ${view===v?"bg-blue-600 text-white":"text-slate-500 hover:bg-slate-100"}`}>
                  {l}
                </button>
              ))}
              <div className="flex items-center gap-2 ml-2 pl-2 border-l border-slate-100">
                <span className={`text-xs px-2 py-0.5 rounded-full font-semibold hidden sm:inline
                  ${syncSt==="synced"?"bg-emerald-100 text-emerald-700":syncSt==="saving"?"bg-amber-100 text-amber-700":"bg-red-100 text-red-600"}`}>
                  {syncSt==="synced"?"● Live":syncSt==="saving"?"⟳":"✕"}
                </span>
                <button onClick={logout} className="text-xs text-slate-400 hover:text-red-500 px-2 py-1">Logout</button>
              </div>
            </div>
          </div>
        </div>
      </nav>

      {/* VIEWS */}
      <div className="max-w-7xl mx-auto px-4 py-6">
        {view==="dashboard" && <DashboardView stats={stats} biharStats={biharStats} proposalList={proposalList} />}
        {view==="propose" && isZSM && <ProposeView user={user} proposals={proposals} onSave={addProposal} notify={notify} setConfirm={setConfirm} />}
        {view==="myproposals" && isZSM && <MyProposalsView myProposals={myProposals} />}
        {view==="approve" && isAdmin && <ApproveView proposals={proposals} proposalList={proposalList} onApprove={approveProposal} onReject={rejectProposal} onConfirm={confirmProposal} notify={notify} setConfirm={setConfirm} />}
        {view==="tracker" && isAdmin && <TrackerView stats={stats} biharStats={biharStats} proposalList={proposalList} />}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   PROPOSE VIEW (ZSM)
══════════════════════════════════════════════════════ */
function ProposeView({user, proposals, onSave, notify, setConfirm}) {
  const [hqFilter, setHqFilter] = useState("");
  const [search,   setSearch]   = useState("");
  const [month,    setMonth]    = useState(curMonth());
  const [editing,  setEditing]  = useState(null); // doctorKey
  const [form,     setForm]     = useState({proposed:0, issued:0});

  const doctors = useMemo(() => {
    return DOCTOR_MASTER.filter(d => {
      if (hqFilter && d.hq !== hqFilter) return false;
      if (search && !d.name.toLowerCase().includes(search.toLowerCase())) return false;
      return true;
    });
  }, [hqFilter, search]);

  const getExisting = (doctorKey) => {
    return Object.values(proposals).find(p => p.doctorKey===doctorKey && p.month===month);
  };

  const startEdit = (doc) => {
    const key = doc.name+"___"+doc.hq;
    const ex = getExisting(key);
    setEditing(key);
    setForm({
      proposed: ex?.entries?.[0]?.proposed || doc.crm26 || 0,
      issued:   ex?.issuedEntries?.[0]?.issued || ex?.entries?.[0]?.proposed || doc.crm26 || 0
    });
  };

  const submitProposal = () => {
    if (!editing) return;
    onSave(editing, [{proposed: Number(form.proposed), issued: Number(form.proposed)}], month);
    setEditing(null);
  };

  return (
    <div>
      <h1 className="text-xl font-black text-slate-800 mb-1">Propose CRM</h1>
      <p className="text-sm text-slate-400 mb-5">Select month, find doctor, set proposed amount</p>

      {/* Edit modal */}
      {editing && (()=>{
        const doc = DOCTOR_MASTER.find(d => d.name+"___"+d.hq === editing);
        const ex = getExisting(editing);
        return (
          <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:"rgba(15,23,42,0.65)"}}>
            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md">
              <div className="px-6 pt-5 pb-4 border-b border-slate-100">
                <h2 className="font-black text-slate-800">Propose CRM – {doc?.name}</h2>
                <p className="text-xs text-slate-400 mt-0.5">{doc?.hq} · {month}</p>
              </div>
              <div className="px-6 py-5 space-y-4">
                <div className="bg-slate-50 rounded-xl p-3 text-xs text-slate-500 space-y-1">
                  <div className="flex justify-between"><span>CRM25 Actual</span><strong>{inr(doc?.crm25_act)}</strong></div>
                  <div className="flex justify-between"><span>Avg PTR FY25</span><strong>{inr(doc?.avg_ptr25)}/mo</strong></div>
                  <div className="flex justify-between"><span>Plan CRM26</span><strong className="text-blue-600">{inr(doc?.crm26)}</strong></div>
                  <div className="flex justify-between"><span>Plan Sales26</span><strong>{inr(doc?.sales26)}</strong></div>
                </div>
                {ex && <div className={`text-xs px-3 py-2 rounded-lg font-semibold ${STATUS_COLORS[ex.status].bg} ${STATUS_COLORS[ex.status].text}`}>Existing: {ex.status} · {inr(ex.entries?.[0]?.proposed)}</div>}
                <div>
                  <label className="text-xs font-bold text-slate-400 uppercase tracking-widest block mb-1.5">Proposed CRM Amount (₹)</label>
                  <input type="number" value={form.proposed} onChange={e=>setForm({...form,proposed:e.target.value})}
                    className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/>
                </div>
              </div>
              <div className="flex gap-3 px-6 pb-5">
                <button onClick={()=>setEditing(null)} className="flex-1 py-2.5 bg-slate-100 text-slate-700 rounded-xl text-sm font-bold">Cancel</button>
                <button onClick={submitProposal} className="flex-1 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700">
                  {ex ? "Update Proposal" : "Submit Proposal"}
                </button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Filters */}
      <div className="flex flex-wrap gap-3 mb-4">
        <select value={month} onChange={e=>setMonth(e.target.value)}
          className="px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 bg-white font-semibold">
          {MONTHS.map(m=><option key={m}>{m}</option>)}
        </select>
        <select value={hqFilter} onChange={e=>setHqFilter(e.target.value)}
          className="px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 bg-white">
          <option value="">All HQs</option>
          {HQ_LIST.map(h=><option key={h}>{h}</option>)}
        </select>
        <input placeholder="Search doctor…" value={search} onChange={e=>setSearch(e.target.value)}
          className="flex-1 min-w-40 px-3 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/>
      </div>

      {/* Doctor table */}
      <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 border-b border-slate-100">
              <tr>
                {["HQ","Doctor","CRM25 Act","Plan CRM26",`${month} Status`,`${month} Amount`,"Action"].map(h=>(
                  <th key={h} className="px-4 py-2.5 text-left text-xs font-bold uppercase text-slate-400">{h}</th>
                ))}
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-50">
              {doctors.map(doc => {
                const key = doc.name+"___"+doc.hq;
                const ex  = getExisting(key);
                const sc  = ex ? STATUS_COLORS[ex.status] : null;
                return (
                  <tr key={key} className="hover:bg-slate-50">
                    <td className="px-4 py-2.5 text-xs text-slate-400">{doc.hq}</td>
                    <td className="px-4 py-2.5 font-semibold text-slate-800">{doc.name}</td>
                    <td className="px-4 py-2.5 text-slate-600">{doc.crm25_act>0?inr(doc.crm25_act):<span className="text-slate-300">—</span>}</td>
                    <td className="px-4 py-2.5 font-bold text-blue-700">{doc.crm26>0?inr(doc.crm26):<span className="text-slate-300">—</span>}</td>
                    <td className="px-4 py-2.5">
                      {ex ? <span className={`px-2 py-0.5 rounded-full text-xs font-bold ${sc.bg} ${sc.text}`}>{ex.status}</span>
                           : <span className="text-slate-300 text-xs">—</span>}
                    </td>
                    <td className="px-4 py-2.5 font-bold text-slate-700">
                      {ex ? inr(ex.entries?.[0]?.proposed) : <span className="text-slate-300 text-xs">—</span>}
                    </td>
                    <td className="px-4 py-2.5">
                      {(!ex || ex.status===STATUSES.PROPOSED) ? (
                        <button onClick={()=>startEdit(doc)}
                          className="px-3 py-1 bg-blue-600 text-white text-xs font-bold rounded-lg hover:bg-blue-700">
                          {ex ? "Edit" : "Propose"}
                        </button>
                      ) : (
                        <span className="text-xs text-slate-300 font-semibold">{ex.status}</span>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        {doctors.length===0 && <div className="text-center py-10 text-slate-300 text-sm">No doctors found</div>}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   APPROVE VIEW (ADMIN)
══════════════════════════════════════════════════════ */
function ApproveView({proposals, proposalList, onApprove, onReject, onConfirm, notify, setConfirm}) {
  const [tab,        setTab]        = useState("pending");
  const [hqFilter,   setHqFilter]   = useState("");
  const [monthFilter,setMonthFilter]= useState("");
  const [issuedAmts, setIssuedAmts] = useState({}); // pid → amount

  const getDoc = (key) => DOCTOR_MASTER.find(d => d.name+"___"+d.hq === key);

  const filtered = useMemo(() => {
    const statusMap = {pending:"Proposed",approved:"Approved",confirmed:"Confirmed",all:null};
    let list = proposalList;
    if (tab!=="all") list = list.filter(p=>p.status===statusMap[tab]);
    if (hqFilter) list = list.filter(p => { const d=getDoc(p.doctorKey); return d?.hq===hqFilter; });
    if (monthFilter) list = list.filter(p=>p.month===monthFilter);
    return list;
  }, [proposalList, tab, hqFilter, monthFilter]);

  const tabCounts = useMemo(()=>({
    pending: proposalList.filter(p=>p.status==="Proposed").length,
    approved: proposalList.filter(p=>p.status==="Approved").length,
    confirmed: proposalList.filter(p=>p.status==="Confirmed").length,
    all: proposalList.length
  }), [proposalList]);

  const handleConfirm = (p) => {
    const issued = issuedAmts[p.id] !== undefined ? Number(issuedAmts[p.id]) : Number(p.entries?.[0]?.proposed||0);
    setConfirm({
      msg: `Confirm & issue ₹${issued.toLocaleString("en-IN")} to ${getDoc(p.doctorKey)?.name}?`,
      okLabel: "Confirm & Issue",
      onOk: () => onConfirm(p.id, [{issued, proposed: p.entries?.[0]?.proposed}])
    });
  };

  return (
    <div>
      <h1 className="text-xl font-black text-slate-800 mb-1">Approve Proposals</h1>
      <p className="text-sm text-slate-400 mb-4">Review, approve, and confirm CRM issuances</p>

      <div className="flex flex-wrap gap-2 mb-4">
        {[["pending","⏳ Pending"],["approved","✅ Approved"],["confirmed","🎯 Confirmed"],["all","All"]].map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)}
            className={`px-3 py-1.5 rounded-xl text-xs font-bold border transition-colors
              ${tab===v?"bg-blue-600 text-white border-blue-600":"bg-white text-slate-500 border-slate-200 hover:bg-slate-50"}`}>
            {l} ({tabCounts[v]})
          </button>
        ))}
        <select value={hqFilter} onChange={e=>setHqFilter(e.target.value)}
          className="px-3 py-1.5 border border-slate-200 rounded-xl text-xs bg-white focus:outline-none">
          <option value="">All HQs</option>
          {HQ_LIST.map(h=><option key={h}>{h}</option>)}
        </select>
        <select value={monthFilter} onChange={e=>setMonthFilter(e.target.value)}
          className="px-3 py-1.5 border border-slate-200 rounded-xl text-xs bg-white focus:outline-none">
          <option value="">All Months</option>
          {MONTHS.map(m=><option key={m}>{m}</option>)}
        </select>
      </div>

      <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 border-b border-slate-100">
              <tr>{["Doctor","HQ","Month","Proposed","Status","Actual Issued","Proposed By","Action"].map(h=>(
                <th key={h} className="px-3 py-2.5 text-left text-xs font-bold uppercase text-slate-400">{h}</th>
              ))}</tr>
            </thead>
            <tbody className="divide-y divide-slate-50">
              {filtered.map(p => {
                const doc = getDoc(p.doctorKey);
                const sc  = STATUS_COLORS[p.status];
                const proposed = p.entries?.[0]?.proposed||0;
                const confirmed_issued = p.issuedEntries?.[0]?.issued;
                return (
                  <tr key={p.id} className="hover:bg-slate-50">
                    <td className="px-3 py-2.5 font-semibold text-slate-800">{doc?.name||"—"}</td>
                    <td className="px-3 py-2.5 text-xs text-slate-400">{doc?.hq}</td>
                    <td className="px-3 py-2.5 text-xs text-slate-500">{p.month}</td>
                    <td className="px-3 py-2.5 font-bold text-slate-700">{inr(proposed)}</td>
                    <td className="px-3 py-2.5"><span className={`px-2 py-0.5 rounded-full text-xs font-bold ${sc.bg} ${sc.text}`}>{p.status}</span></td>
                    <td className="px-3 py-2.5">
                      {p.status===STATUSES.APPROVED ? (
                        <input type="number"
                          value={issuedAmts[p.id]!==undefined ? issuedAmts[p.id] : proposed}
                          onChange={e=>setIssuedAmts(prev=>({...prev,[p.id]:e.target.value}))}
                          className="w-28 px-2 py-1 border border-slate-200 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-blue-300"/>
                      ) : confirmed_issued ? (
                        <span className="font-bold text-emerald-700">{inr(confirmed_issued)}</span>
                      ) : <span className="text-slate-300">—</span>}
                    </td>
                    <td className="px-3 py-2.5 text-xs text-slate-400">{p.proposedBy}</td>
                    <td className="px-3 py-2.5">
                      <div className="flex gap-1.5 flex-wrap">
                        {p.status===STATUSES.PROPOSED && (
                          <>
                            <button onClick={()=>onApprove(p.id)}
                              className="px-2.5 py-1 bg-blue-600 text-white text-xs font-bold rounded-lg hover:bg-blue-700">Approve</button>
                            <button onClick={()=>setConfirm({msg:`Reject "${doc?.name}" proposal?`,okLabel:"Reject",onOk:()=>onReject(p.id)})}
                              className="px-2.5 py-1 bg-slate-100 text-slate-500 text-xs font-bold rounded-lg hover:bg-slate-200">Reject</button>
                          </>
                        )}
                        {p.status===STATUSES.APPROVED && (
                          <>
                            <button onClick={()=>handleConfirm(p)}
                              className="px-2.5 py-1 bg-emerald-600 text-white text-xs font-bold rounded-lg hover:bg-emerald-700">Confirm</button>
                            <button onClick={()=>setConfirm({msg:`Revert "${doc?.name}" to Proposed?`,okLabel:"Revert",onOk:()=>onReject(p.id)})}
                              className="px-2.5 py-1 bg-slate-100 text-slate-500 text-xs font-bold rounded-lg">Undo</button>
                          </>
                        )}
                        {p.status===STATUSES.CONFIRMED && (
                          <span className="text-xs text-emerald-600 font-bold">✓ Done</span>
                        )}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        {filtered.length===0 && <div className="text-center py-10 text-slate-300 text-sm">No proposals in this view</div>}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   TRACKER VIEW (ADMIN)
══════════════════════════════════════════════════════ */
function TrackerView({stats, biharStats, proposalList}) {
  const [groupBy, setGroupBy] = useState("hq"); // hq | asm | month

  // Month-wise breakdown
  const monthStats = useMemo(() => {
    const ms = {};
    MONTHS.forEach(m => ms[m] = {proposed:0,approved:0,confirmed:0,count:0});
    proposalList.forEach(p => {
      if (!ms[p.month]) return;
      const a = p.entries?.[0]?.proposed||0;
      const i = p.issuedEntries?.[0]?.issued||a;
      if (p.status===STATUSES.PROPOSED||p.status===STATUSES.APPROVED||p.status===STATUSES.CONFIRMED)
        ms[p.month].proposed+=a;
      if (p.status===STATUSES.APPROVED||p.status===STATUSES.CONFIRMED)
        ms[p.month].approved+=a;
      if (p.status===STATUSES.CONFIRMED) { ms[p.month].confirmed+=i; ms[p.month].count++; }
    });
    return ms;
  }, [proposalList]);

  const asmStats = useMemo(() => {
    const asms = {"ASM Darbhanga":{plan:0,proposed:0,approved:0,confirmed:0},"ASM Saharsa":{plan:0,proposed:0,approved:0,confirmed:0},"ASM Patna":{plan:0,proposed:0,approved:0,confirmed:0}};
    HQ_LIST.forEach(hq => {
      const asm = ASM_MAP[hq];
      asms[asm].plan += HQ_PLAN[hq];
      asms[asm].proposed  += stats[hq]?.proposed||0;
      asms[asm].approved  += stats[hq]?.approved||0;
      asms[asm].confirmed += stats[hq]?.confirmed||0;
    });
    return asms;
  }, [stats]);

  return (
    <div>
      <h1 className="text-xl font-black text-slate-800 mb-1">Tracker</h1>
      <p className="text-sm text-slate-400 mb-5">Month-wise CRM26 tracking with utilisation</p>

      {/* Summary */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
        <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-4">
          <p className="text-xs font-bold uppercase text-slate-400 mb-1">Bihar Plan</p>
          <p className="text-2xl font-black text-slate-800">{inrL(BIHAR_TOTAL)}</p>
        </div>
        {[{l:"Proposed",v:biharStats.proposed,c:"text-amber-700"},{l:"Approved",v:biharStats.approved,c:"text-blue-700"},{l:"Confirmed",v:biharStats.confirmed,c:"text-emerald-700"}].map(x=>(
          <div key={x.l} className="bg-white rounded-2xl border border-slate-100 shadow-sm p-4">
            <p className="text-xs font-bold uppercase text-slate-400 mb-1">{x.l}</p>
            <p className={`text-2xl font-black ${x.c}`}>{inrL(x.v)}</p>
            <p className="text-xs text-slate-400 mt-0.5">{((x.v/BIHAR_TOTAL)*100).toFixed(1)}% util</p>
          </div>
        ))}
      </div>

      {/* Toggle */}
      <div className="flex gap-1 mb-4 bg-slate-100 p-1 rounded-xl w-fit">
        {[["hq","By HQ"],["asm","By ASM"],["month","By Month"]].map(([v,l])=>(
          <button key={v} onClick={()=>setGroupBy(v)}
            className={`px-4 py-1.5 rounded-lg text-xs font-semibold ${groupBy===v?"bg-white text-blue-700 shadow-sm":"text-slate-500"}`}>{l}</button>
        ))}
      </div>

      {/* HQ Table */}
      {groupBy==="hq" && (
        <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-slate-50 border-b border-slate-100">
                <tr>{["HQ","ASM","Plan CRM26","Proposed","Approved","Confirmed","HQ Util%","Bihar Util%"].map(h=>(
                  <th key={h} className="px-4 py-2.5 text-left text-xs font-bold uppercase text-slate-400">{h}</th>
                ))}</tr>
              </thead>
              <tbody className="divide-y divide-slate-50">
                {HQ_LIST.map(hq=>{
                  const s=stats[hq]||{plan:0,proposed:0,approved:0,confirmed:0};
                  const hqUtil=s.plan>0?Math.round(s.confirmed/s.plan*100):0;
                  const biharUtil=Math.round(s.confirmed/BIHAR_TOTAL*100);
                  return (
                    <tr key={hq} className="hover:bg-slate-50">
                      <td className="px-4 py-2.5 font-semibold text-slate-800">{hq}</td>
                      <td className="px-4 py-2.5 text-xs text-slate-400">{ASM_MAP[hq]}</td>
                      <td className="px-4 py-2.5 font-bold text-slate-700">{inrL(s.plan)}</td>
                      <td className="px-4 py-2.5"><span className="px-2 py-0.5 rounded-full text-xs font-bold bg-amber-100 text-amber-700">{inrL(s.proposed)}</span></td>
                      <td className="px-4 py-2.5"><span className="px-2 py-0.5 rounded-full text-xs font-bold bg-blue-100 text-blue-700">{inrL(s.approved)}</span></td>
                      <td className="px-4 py-2.5"><span className="px-2 py-0.5 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700">{inrL(s.confirmed)}</span></td>
                      <td className="px-4 py-2.5">
                        <div className="flex items-center gap-2">
                          <div className="w-14 bg-slate-100 rounded-full h-1.5">
                            <div className="bg-emerald-500 h-1.5 rounded-full" style={{width:`${Math.min(hqUtil,100)}%`}}/>
                          </div>
                          <span className={`text-xs font-bold ${hqUtil>=80?"text-emerald-600":hqUtil>=50?"text-amber-600":"text-slate-400"}`}>{hqUtil}%</span>
                        </div>
                      </td>
                      <td className="px-4 py-2.5 text-xs font-bold text-blue-600">{biharUtil}%</td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot>
                <tr className="bg-blue-50 border-t-2 border-blue-200 font-black">
                  <td className="px-4 py-3 text-blue-800" colSpan={2}>Bihar Total</td>
                  <td className="px-4 py-3">{inrL(BIHAR_TOTAL)}</td>
                  <td className="px-4 py-3 text-amber-700">{inrL(biharStats.proposed)}</td>
                  <td className="px-4 py-3 text-blue-700">{inrL(biharStats.approved)}</td>
                  <td className="px-4 py-3 text-emerald-700">{inrL(biharStats.confirmed)}</td>
                  <td className="px-4 py-3 text-emerald-700">{((biharStats.confirmed/BIHAR_TOTAL)*100).toFixed(1)}%</td>
                  <td className="px-4 py-3"></td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
      )}

      {/* ASM Table */}
      {groupBy==="asm" && (
        <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-slate-50 border-b border-slate-100">
                <tr>{["ASM","Plan CRM26","Proposed","Approved","Confirmed","Util%"].map(h=>(
                  <th key={h} className="px-4 py-2.5 text-left text-xs font-bold uppercase text-slate-400">{h}</th>
                ))}</tr>
              </thead>
              <tbody className="divide-y divide-slate-50">
                {Object.entries(asmStats).map(([asm,s])=>{
                  const util=s.plan>0?Math.round(s.confirmed/s.plan*100):0;
                  const hqsUnder = HQ_LIST.filter(h=>ASM_MAP[h]===asm);
                  return (
                    <React.Fragment key={asm}>
                      <tr className="bg-slate-50 font-black text-slate-700">
                        <td className="px-4 py-2.5 text-blue-700">{asm}</td>
                        <td className="px-4 py-2.5">{inrL(s.plan)}</td>
                        <td className="px-4 py-2.5"><span className="text-amber-700">{inrL(s.proposed)}</span></td>
                        <td className="px-4 py-2.5"><span className="text-blue-700">{inrL(s.approved)}</span></td>
                        <td className="px-4 py-2.5"><span className="text-emerald-700">{inrL(s.confirmed)}</span></td>
                        <td className="px-4 py-2.5 text-emerald-600">{util}%</td>
                      </tr>
                      {hqsUnder.map(hq=>{
                        const hs=stats[hq]||{plan:0,proposed:0,approved:0,confirmed:0};
                        const hu=hs.plan>0?Math.round(hs.confirmed/hs.plan*100):0;
                        return (
                          <tr key={hq} className="hover:bg-slate-50">
                            <td className="px-4 py-2 pl-10 text-slate-500 text-xs">↳ {hq}</td>
                            <td className="px-4 py-2 text-xs text-slate-500">{inrL(hs.plan)}</td>
                            <td className="px-4 py-2 text-xs text-amber-600">{inrL(hs.proposed)}</td>
                            <td className="px-4 py-2 text-xs text-blue-600">{inrL(hs.approved)}</td>
                            <td className="px-4 py-2 text-xs text-emerald-600">{inrL(hs.confirmed)}</td>
                            <td className="px-4 py-2 text-xs text-slate-400">{hu}%</td>
                          </tr>
                        );
                      })}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Month Table */}
      {groupBy==="month" && (
        <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-slate-50 border-b border-slate-100">
                <tr>{["Month","Proposed","Approved","Confirmed","Doctors Issued"].map(h=>(
                  <th key={h} className="px-4 py-2.5 text-left text-xs font-bold uppercase text-slate-400">{h}</th>
                ))}</tr>
              </thead>
              <tbody className="divide-y divide-slate-50">
                {MONTHS.map(m=>{
                  const ms=monthStats[m]||{proposed:0,approved:0,confirmed:0,count:0};
                  const hasData=ms.proposed>0||ms.approved>0||ms.confirmed>0;
                  return (
                    <tr key={m} className={`hover:bg-slate-50 ${!hasData?"opacity-40":""}`}>
                      <td className="px-4 py-2.5 font-semibold text-slate-700">{m}</td>
                      <td className="px-4 py-2.5"><span className="px-2 py-0.5 rounded-full text-xs font-bold bg-amber-100 text-amber-700">{inrL(ms.proposed)}</span></td>
                      <td className="px-4 py-2.5"><span className="px-2 py-0.5 rounded-full text-xs font-bold bg-blue-100 text-blue-700">{inrL(ms.approved)}</span></td>
                      <td className="px-4 py-2.5"><span className="px-2 py-0.5 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700">{inrL(ms.confirmed)}</span></td>
                      <td className="px-4 py-2.5 text-slate-500 text-xs">{ms.count} doctors</td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot>
                <tr className="bg-blue-50 border-t-2 border-blue-200 font-black">
                  <td className="px-4 py-3 text-blue-800">Total</td>
                  <td className="px-4 py-3 text-amber-700">{inrL(biharStats.proposed)}</td>
                  <td className="px-4 py-3 text-blue-700">{inrL(biharStats.approved)}</td>
                  <td className="px-4 py-3 text-emerald-700">{inrL(biharStats.confirmed)}</td>
                  <td className="px-4 py-3 text-slate-600">{proposalList.filter(p=>p.status===STATUSES.CONFIRMED).length} total</td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
