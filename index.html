const getPTR = (productName) => {
  if (!productName) return 0;
  const upper = productName.toString().toUpperCase().trim();
  // exact match first
  for (const [k,v] of Object.entries(PTR_MAP)) {
    if (upper === k.toUpperCase()) return v;
  }
  // partial match
  for (const [k,v] of Object.entries(PTR_MAP)) {
    if (upper.includes(k.toUpperCase()) || k.toUpperCase().includes(upper)) return v;
  }
  return 0;
};

const uid   = () => Math.random().toString(36).slice(2,9);
const inr   = (n) => "₹"+Number(n||0).toLocaleString("en-IN");
const inrL  = (n) => (Number(n||0)/100000).toFixed(2)+"L";
const toArr = (v) => { if(!v)return[]; if(Array.isArray(v))return v.filter(Boolean); if(typeof v==="object")return Object.values(v).filter(Boolean); return[]; };
const now   = () => new Date().toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"});
const pct   = (a,p) => p>0 ? Math.round(a/p*100) : null;

const achColor = (p) => {
  if (p === null) return "";
  if (p >= 100) return "bg-purple-100 text-purple-700";
  if (p >= 90)  return "bg-emerald-100 text-emerald-700";
  if (p >= 80)  return "bg-blue-100 text-blue-700";
  return "bg-red-100 text-red-600";
};
const achLabel = (p) => {
  if (p === null) return "";
  if (p >= 100) return "🏆 Exceptional";
  if (p >= 90)  return "🌟 Excellent";
  if (p >= 80)  return "✅ Good";
  return "⚠️ Below";
};

function App() {
  const [user,      setUser]      = useState(null);
  const [view,      setView]      = useState("dashboard");
  const [proposals, setProposals] = useState({});
  const [salesData, setSalesData] = useState({});  // {year: {doctorKey: {month: value}}}
  const [loaded,    setLoaded]    = useState(false);
  const [syncSt,    setSyncSt]    = useState("connecting");
  const [toast,     setToast]     = useState(null);
  const [confirm,   setConfirm]   = useState(null);
  const [loginEmail,setLoginEmail]= useState("");
  const [loginPwd,  setLoginPwd]  = useState("");
  const [loginErr,  setLoginErr]  = useState("");

  useEffect(() => {
    const ref = DB.ref(DB_PATH);
    ref.on("value", snap => {
      const raw = snap.val() || {};
      setProposals(raw.proposals || {});
      setSalesData(raw.salesData || {});
      setLoaded(true);
      setSyncSt("synced");
    }, () => { setSyncSt("error"); setLoaded(true); });
    return () => ref.off();
  }, []);

  const saveProposal = (path, data) => {
    setSyncSt("saving");
    DB.ref(DB_PATH+"/proposals/"+path).set(data).then(()=>setSyncSt("synced")).catch(()=>setSyncSt("error"));
  };
  const saveSalesData = (data) => {
    setSyncSt("saving");
    DB.ref(DB_PATH+"/salesData").set(data).then(()=>setSyncSt("synced")).catch(()=>setSyncSt("error"));
  };

  const notify = (msg, c="green") => { setToast({msg,c}); setTimeout(()=>setToast(null),2800); };

  const login = () => {
    const role = CREDS[loginEmail.trim().toLowerCase()];
    if (!role || loginPwd !== "aldan") { setLoginErr("Invalid credentials"); return; }
    setUser({email:loginEmail.trim().toLowerCase(), role});
  };
  const logout = () => { setUser(null); setView("dashboard"); };

  const proposalList = useMemo(() => toArr(Object.values(proposals)), [proposals]);

  const addProposal = (doctorKey, entries, month, year, type="primary") => {
    // For primary: one per doctor per year (overwrite if exists)
    // For additional: always create new
    if (type==="primary") {
      const existing = Object.values(proposals).find(p =>
        p.doctorKey===doctorKey && p.type!=="additional" &&
        (p.year||"FY 2026-27")===(year||"FY 2026-27")
      );
      if (existing) {
        saveProposal(existing.id, {...existing, entries, month, updatedAt:now()});
      } else {
        const id = uid();
        saveProposal(id, { id, doctorKey, month, year:year||"FY 2026-27", entries,
          type:"primary", status:STATUSES.PROPOSED, proposedBy:user.email, proposedAt:now(), updatedAt:now() });
      }
    } else {
      const id = uid();
      saveProposal(id, { id, doctorKey, month, year:year||"FY 2026-27", entries,
        type:"additional", status:STATUSES.PROPOSED, proposedBy:user.email, proposedAt:now(), updatedAt:now() });
    }
    notify("Proposal saved!");
  };

  const approveProposal = (pid) => {
    const p = proposals[pid]; if (!p) return;
    saveProposal(pid, {...p, status:STATUSES.APPROVED, approvedBy:user.email, approvedAt:now(), updatedAt:now()});
    notify("Approved!");
  };
  const confirmProposal = (pid, issuedEntries, revert=false) => {
    const p = proposals[pid]; if (!p) return;
    if (revert) {
      // Unconfirm — revert to Approved
      saveProposal(pid, {...p, status:STATUSES.APPROVED, issuedEntries:null, confirmedBy:null, confirmedAt:null, updatedAt:now()});
      notify("Unconfirmed — reverted to Approved","amber");
    } else {
      saveProposal(pid, {...p, status:STATUSES.CONFIRMED, issuedEntries, confirmedBy:user.email, confirmedAt:now(), updatedAt:now()});
      notify("Confirmed!");
    }
  };
  const rejectProposal = (pid) => {
    const p = proposals[pid]; if (!p) return;
    saveProposal(pid, {...p, status:STATUSES.PROPOSED, approvedBy:null, approvedAt:null, updatedAt:now()});
    notify("Reverted","amber");
  };

  const withdrawProposal = (pid) => {
    setSyncSt("saving");
    DB.ref(DB_PATH+"/proposals/"+pid).remove()
      .then(()=>{ setSyncSt("synced"); notify("Proposal withdrawn","red"); })
      .catch(()=>setSyncSt("error"));
  };

  const stats = useMemo(() => {
    const hqStats = {};
    HQ_LIST.forEach(hq => { hqStats[hq] = {plan:HQ_PLAN[hq],proposed:0,approved:0,confirmed:0}; });
    proposalList.forEach(p => {
      const doc = DOCTOR_MASTER.find(d => d.name+"___"+d.hq===p.doctorKey);
      if (!doc || !hqStats[doc.hq]) return;
      const amt = (p.entries||[]).reduce((s,e)=>s+Number(e.proposed||0),0);
      const iss = (p.issuedEntries||p.entries||[]).reduce((s,e)=>s+Number(e.issued||e.proposed||0),0);
      if ([STATUSES.PROPOSED,STATUSES.APPROVED,STATUSES.CONFIRMED].includes(p.status)) hqStats[doc.hq].proposed += amt;
      if ([STATUSES.APPROVED,STATUSES.CONFIRMED].includes(p.status)) hqStats[doc.hq].approved += amt;
      if (p.status===STATUSES.CONFIRMED) hqStats[doc.hq].confirmed += iss;
    });
    return hqStats;
  }, [proposalList]);

  const biharStats = useMemo(() => ({
    proposed: Object.values(stats).reduce((s,v)=>s+v.proposed,0),
    approved:  Object.values(stats).reduce((s,v)=>s+v.approved,0),
    confirmed: Object.values(stats).reduce((s,v)=>s+v.confirmed,0),
  }), [stats]);

  const isZSM   = user?.role==="zsm";
  const isAdmin = user?.role==="admin";

  /* ── LOGIN ── */
  if (!user) return (
    <div className="min-h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 flex items-center justify-center px-4">
      <div className="w-full max-w-sm">
        <div className="text-center mb-8">
          <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-600 shadow-xl mb-4"><span className="text-2xl">💊</span></div>
          <h1 className="text-2xl font-black text-white">Aldan Healthcare</h1>
          <p className="text-blue-300 text-sm mt-1">CRM 26 – Bihar Region</p>
        </div>
        <div className="bg-white/10 backdrop-blur rounded-2xl p-6 shadow-2xl border border-white/10">
          <div className="space-y-3 mb-4">
            <div>
              <label className="text-xs font-bold text-blue-200 uppercase tracking-widest block mb-1.5">Email</label>
              <input value={loginEmail} onChange={e=>{setLoginEmail(e.target.value);setLoginErr("");}} onKeyDown={e=>e.key==="Enter"&&login()}
                placeholder="zsm@aldan or admin@aldan"
                className="w-full px-4 py-2.5 rounded-xl bg-white/15 border border-white/20 text-white placeholder-white/30 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
            </div>
            <div>
              <label className="text-xs font-bold text-blue-200 uppercase tracking-widest block mb-1.5">Password</label>
              <input type="password" value={loginPwd} onChange={e=>{setLoginPwd(e.target.value);setLoginErr("");}} onKeyDown={e=>e.key==="Enter"&&login()}
                placeholder="••••••"
                className="w-full px-4 py-2.5 rounded-xl bg-white/15 border border-white/20 text-white placeholder-white/30 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"/>
            </div>
          </div>
          {loginErr && <p className="text-red-300 text-xs mb-3 font-semibold">{loginErr}</p>}
          <button onClick={login} className="w-full py-2.5 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-xl text-sm">Sign In →</button>
          <p className="text-white/20 text-xs text-center mt-4">Password: aldan</p>
        </div>
      </div>
    </div>
  );

  if (!loaded) return (
    <div className="min-h-screen flex items-center justify-center bg-slate-50">
      <div className="text-center"><div className="text-4xl animate-bounce mb-3">💊</div><p className="font-bold text-slate-500">Loading…</p></div>
    </div>
  );

  const navItems = isZSM
    ? [["dashboard","📊","Dashboard"],["propose","➕","Propose"],["myproposals","📋","My Proposals"],["salestrack","📈","Sales Track"]]
    : [["dashboard","📊","Dashboard"],["approve","✅","Approve"],["tracker","📈","Tracker"],["salestrack","📊","Sales Track"]];

  return (
    <div className="min-h-screen bg-slate-50">
      {toast && (
        <div className={`fixed top-4 right-4 z-[200] px-4 py-2.5 rounded-xl text-white text-sm font-bold shadow-xl
          ${toast.c==="green"?"bg-emerald-500":toast.c==="red"?"bg-red-500":toast.c==="amber"?"bg-amber-500":"bg-blue-500"}`}>
          {toast.msg}
        </div>
      )}
      {confirm && (
        <div className="fixed inset-0 z-[150] flex items-center justify-center p-4" style={{background:"rgba(15,23,42,0.6)"}}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
            <p className="text-center font-semibold text-slate-700 mb-5">{confirm.msg}</p>
            <div className="flex gap-3">
              <button onClick={()=>setConfirm(null)} className="flex-1 py-2.5 bg-slate-100 rounded-xl text-sm font-bold text-slate-600">Cancel</button>
              <button onClick={()=>{confirm.onOk();setConfirm(null);}} className="flex-1 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-bold">{confirm.okLabel||"Confirm"}</button>
            </div>
          </div>
        </div>
      )}

      {/* NAV — mobile fixed */}
      <nav className="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
        <div className="max-w-7xl mx-auto px-3">
          <div className="flex items-center justify-between h-12">
            {/* Logo — compact single line */}
            <div className="flex items-center gap-1.5 shrink-0">
              <span className="text-base font-black text-blue-700 whitespace-nowrap">💊 CRM 26</span>
              <span className="text-xs font-bold text-blue-400 bg-blue-50 px-1.5 py-0.5 rounded-md whitespace-nowrap">{APP_VERSION}</span>
            </div>
            {/* Nav items */}
            <div className="flex items-center gap-0.5 overflow-x-auto">
              {navItems.map(([v,icon,label]) => (
                <button key={v} onClick={()=>setView(v)}
                  className={`px-2 py-1.5 rounded-lg text-xs font-semibold whitespace-nowrap transition-colors flex items-center gap-1
                    ${view===v?"bg-blue-600 text-white":"text-slate-500 hover:bg-slate-100"}`}>
                  <span>{icon}</span>
                  <span className="hidden sm:inline">{label}</span>
                </button>
              ))}
              <div className="flex items-center ml-1 pl-1 border-l border-slate-100 shrink-0">
                <span className={`text-xs px-1.5 py-0.5 rounded-full font-semibold hidden md:inline
                  ${syncSt==="synced"?"bg-emerald-100 text-emerald-700":syncSt==="saving"?"bg-amber-100 text-amber-700":"bg-red-100 text-red-600"}`}>
                  {syncSt==="synced"?"●":syncSt==="saving"?"⟳":"✕"}
                </span>
                <button onClick={logout} className="text-xs text-slate-400 hover:text-red-500 px-2 py-1 ml-1">Exit</button>
              </div>
            </div>
          </div>
        </div>
      </nav>

      <div className="max-w-7xl mx-auto px-3 py-5">
        {view==="dashboard"    && <DashboardView stats={stats} biharStats={biharStats} proposalList={proposalList} />}
        {view==="propose"      && isZSM   && <ProposeView user={user} proposals={proposals} onSave={addProposal} onWithdraw={withdrawProposal} notify={notify} setConfirm={setConfirm} />}
        {view==="myproposals"  && isZSM   && <MyProposalsView myProposals={proposalList.filter(p=>p.proposedBy===user.email)} onWithdraw={withdrawProposal} setConfirm={setConfirm} />}
        {view==="approve"      && isAdmin  && <ApproveView proposals={proposals} proposalList={proposalList} onApprove={approveProposal} onReject={rejectProposal} onConfirm={confirmProposal} onWithdraw={withdrawProposal} setConfirm={setConfirm} />}
        {view==="tracker"      && isAdmin  && <TrackerView stats={stats} biharStats={biharStats} proposalList={proposalList} />}
        {view==="salestrack"   && <SalesTrackView salesData={salesData} onSave={saveSalesData} isAdmin={isAdmin} notify={notify} setConfirm={setConfirm} />}
      </div>
    </div>
  );
}

function DashboardView({stats, biharStats, proposalList}) {

          <div style="font-size:22px;font-weight:900;color:#c084fc;">₹${(HQ_PLAN[hq]/100000).toFixed(2)}L</div>

      <div style="background:rgba(255,255,255,0.06);border-radius:999px;height:8px;overflow:hidden;margin-bottom:20px">
        <div style="background:linear-gradient(90deg,#6366f1,#34d399);height:100%;width:${pct}%;border-radius:999px;"></div>
      </div>
      <div style="margin-bottom:8px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,0.3);">Pending Doctor List</div>
      ${rows}
      <div style="font-size:10px;color:rgba(255,255,255,0.2);text-align:center;margin-top:20px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.07)">CRM 26 · crm.aldancare.com · ${dt}</div>
    </div>`;
  };

  const makeAllHQsCardHTML = () => {
    const dt = new Date().toLocaleDateString("en-IN",{day:"numeric",month:"long",year:"numeric"});
    let grandTotal=0; let grandCount=0;
    const hqRows = HQ_LIST.map(hq => {
      const pending = pendingByHQ[hq]||[];
      if (!pending.length) return '';
      const t = pending.reduce((s,d)=>s+d.crm26,0);
      grandTotal+=t; grandCount+=pending.length;
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,0.06);">

          <div style="font-size:13px;font-weight:800;color:white;">${hq}</div>

    const proposedCount = totalDocs - grandCount;

    return `<div id="share-card" style="width:800px;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 60%,#1e40af 100%);padding:40px;font-family:Arial,sans-serif;color:white;box-sizing:border-box;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid rgba(255,255,255,0.1)">
        <div>
          <div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:3px;margin-bottom:6px">💊 CRM 26 · Aldan Healthcare</div>
          <div style="font-size:24px;font-weight:900;margin-bottom:3px">Bihar — Pending Doctors</div>

          <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.35);margin-bottom:5px">Total Doctors</div>

          <div style="font-size:22px;font-weight:900;color:#fbbf24;">₹${(grandTotal/100000).toFixed(2)}L</div>
        </div>
        <div style="flex:1;min-width:160px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:14px 16px">

          <div style="font-size:22px;font-weight:900;color:#c084fc;">₹49.50L</div>

      <div style="font-size:10px;color:rgba(255,255,255,0.2);text-align:center;margin-top:20px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.07)">CRM 26 · crm.aldancare.com · ${dt}</div>

    wrap.style.cssText = 'position:fixed;left:-9999px;top:0;z-index:-999;';

    document.body.appendChild(wrap);
    try {
      await new Promise(r=>setTimeout(r,300));
      const card = wrap.querySelector('#share-card');
      const canvas = await html2canvas(card, {scale:2, useCORS:true, logging:false, backgroundColor:null});

      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

        const win = window.open('','_blank');

    await generateAndDownload(makeAllHQsCardHTML(), `CRM_Pending_Bihar_${shareYear.replace(/\s/g,'_')}`);
    setSharing(null);
  };

  const proposed  = proposalList.filter(p=>p.status===STATUSES.PROPOSED).length;
  const approved  = proposalList.filter(p=>p.status===STATUSES.APPROVED).length;
  const confirmed = proposalList.filter(p=>p.status===STATUSES.CONFIRMED).length;

  return (
    <div>
      <h1 className="text-xl font-black text-slate-800 mb-1">Dashboard</h1>
      <p className="text-sm text-slate-400 mb-4">Bihar CRM 26 – Real-time overview</p>

      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
        <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-4">
          <p className="text-xs font-bold uppercase text-slate-400 mb-1">Bihar Plan CRM26</p>
          <p className="text-2xl font-black text-slate-800">{inrL(BIHAR_TOTAL)}</p>
        </div>
        <div className="bg-white rounded-2xl border border-amber-100 shadow-sm p-4">
          <p className="text-xs font-bold uppercase text-amber-600 mb-1">Proposed</p>
          <p className="text-2xl font-black text-amber-700">{inrL(biharStats.proposed)}</p>
          <p className="text-xs text-slate-400 mt-0.5">{((biharStats.proposed/BIHAR_TOTAL)*100).toFixed(1)}% of plan</p>
        </div>
        <div className="bg-white rounded-2xl border border-blue-100 shadow-sm p-4">
          <p className="text-xs font-bold uppercase text-blue-600 mb-1">Approved</p>
          <p className="text-2xl font-black text-blue-700">{inrL(biharStats.approved)}</p>
          <p className="text-xs text-slate-400 mt-0.5">{((biharStats.approved/BIHAR_TOTAL)*100).toFixed(1)}% of plan</p>
        </div>
        <div className="bg-white rounded-2xl border border-emerald-100 shadow-sm p-4">
          <p className="text-xs font-bold uppercase text-emerald-600 mb-1">Confirmed</p>
          <p className="text-2xl font-black text-emerald-700">{inrL(biharStats.confirmed)}</p>
          <p className="text-xs text-slate-400 mt-0.5">{((biharStats.confirmed/BIHAR_TOTAL)*100).toFixed(1)}% of plan</p>
        </div>
      </div>

      <div className="grid grid-cols-3 gap-3 mb-5">
        {[{l:"Proposed",v:proposed,c:"bg-amber-50 border-amber-100",t:"text-amber-700"},{l:"Approved",v:approved,c:"bg-blue-50 border-blue-100",t:"text-blue-700"},{l:"Confirmed",v:confirmed,c:"bg-emerald-50 border-emerald-100",t:"text-emerald-700"}].map(x=>(
          <div key={x.l} className={`${x.c} rounded-2xl border p-3 text-center`}>
            <p className={`text-2xl font-black ${x.t}`}>{x.v}</p>
            <p className={`text-xs font-bold uppercase ${x.t} mt-0.5`}>{x.l}</p>
          </div>
        ))}
      </div>

      <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
        <div className="px-4 py-3 border-b border-slate-50 flex flex-wrap gap-2 items-center justify-between">
          <h3 className="font-black text-slate-700 text-sm">HQ-wise CRM26 Status</h3>
          <div className="flex items-center gap-2 flex-wrap">
            <span className="text-xs text-slate-400 font-semibold">Pending for:</span>
            <select value={shareYear} onChange={e=>setShareYear(e.target.value)}
              className="px-2 py-1 border border-slate-200 rounded-lg text-xs bg-white focus:outline-none">
              {YEARS.map(y=><option key={y}>{y}</option>)}
            </select>
            <button onClick={shareAll} disabled={!!sharing}
              className={`px-2 py-1 text-white text-xs font-bold rounded-lg ${sharing==='all'?"bg-emerald-400 animate-pulse":"bg-emerald-600 hover:bg-emerald-700"}`}>
              {sharing==='all'?"⟳ Generating…":"🖼️ Share All"}
            </button>
          </div>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 border-b border-slate-100">
              <tr>{["HQ","ASM","Plan","Proposed","Approved","Confirmed","Util%","Pending","Share"].map(h=>(
                <th key={h} className="px-3 py-2.5 text-left text-xs font-bold uppercase text-slate-400">{h}</th>
              ))}</tr>
            </thead>
            <tbody className="divide-y divide-slate-50">
              {HQ_LIST.map(hq => {
                const s = stats[hq]||{plan:0,proposed:0,approved:0,confirmed:0};
                const util = s.plan>0 ? Math.round(s.confirmed/s.plan*100) : 0;
                const pendingDocs = pendingByHQ[hq]||[];
                return (
                  <tr key={hq} className="hover:bg-slate-50">
                    <td className="px-3 py-2.5 font-semibold text-slate-800">{hq}</td>
                    <td className="px-3 py-2.5 text-xs text-slate-400">{ASM_MAP[hq]}</td>
                    <td className="px-3 py-2.5 font-bold text-slate-700">{inrL(s.plan)}</td>
                    <td className="px-3 py-2.5"><span className="px-1.5 py-0.5 rounded-full text-xs font-bold bg-amber-100 text-amber-700">{inrL(s.proposed)}</span></td>
                    <td className="px-3 py-2.5"><span className="px-1.5 py-0.5 rounded-full text-xs font-bold bg-blue-100 text-blue-700">{inrL(s.approved)}</span></td>
                    <td className="px-3 py-2.5"><span className="px-1.5 py-0.5 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700">{inrL(s.confirmed)}</span></td>
                    <td className="px-3 py-2.5">
                      <div className="flex items-center gap-1.5">
                        <div className="w-12 bg-slate-100 rounded-full h-1.5"><div className="bg-emerald-500 h-1.5 rounded-full" style={{width:`${Math.min(util,100)}%`}}/></div>
                        <span className={`text-xs font-bold ${util>=80?"text-emerald-600":util>=50?"text-amber-600":"text-slate-400"}`}>{util}%</span>
                      </div>
                    </td>
                    <td className="px-3 py-2.5">
                      {pendingDocs.length>0
                        ?<span className="px-1.5 py-0.5 rounded-full text-xs font-bold bg-red-100 text-red-600">{pendingDocs.length} docs</span>
                        :<span className="text-xs text-emerald-500 font-bold">✓ Done</span>}
                    </td>
                    <td className="px-3 py-2.5">
                      {pendingDocs.length>0&&(
                        <button onClick={()=>shareHQ(hq)} disabled={!!sharing}
                          className={`px-2 py-1 text-xs font-bold rounded-lg border ${sharing===hq?"bg-emerald-50 text-emerald-300 animate-pulse border-emerald-100":"bg-emerald-50 text-emerald-700 border-emerald-200 hover:bg-emerald-100"}`}>
                          {sharing===hq?"⟳":"🖼️"} Card
                        </button>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr className="bg-blue-50 border-t-2 border-blue-200 font-black">
                <td className="px-3 py-3 text-blue-800" colSpan={2}>Bihar Total</td>
                <td className="px-3 py-3">{inrL(BIHAR_TOTAL)}</td>
                <td className="px-3 py-3 text-amber-700">{inrL(biharStats.proposed)}</td>
                <td className="px-3 py-3 text-blue-700">{inrL(biharStats.approved)}</td>
                <td className="px-3 py-3 text-emerald-700">{inrL(biharStats.confirmed)}</td>
                <td className="px-3 py-3 text-emerald-700">{((biharStats.confirmed/BIHAR_TOTAL)*100).toFixed(1)}%</td>
                <td className="px-3 py-3 text-red-600">{Object.values(pendingByHQ).reduce((s,v)=>s+v.length,0)} docs</td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   PROPOSE VIEW
══════════════════════════════════════════════════════ */
function ProposeView({user, proposals, onSave, onWithdraw, notify, setConfirm}) {
  const [month,       setMonth]       = useState("");
  const [year,        setYear]        = useState("");
  const [hqFilter,    setHqFilter]    = useState("");
  const [search,      setSearch]      = useState("");
  const [showPending, setShowPending] = useState(false);
  const [selected,    setSelected]    = useState({});
  const [bulkModal,   setBulkModal]   = useState(false);
  const [bulkAmts,    setBulkAmts]    = useState({});
  const [editModal,   setEditModal]   = useState(null);
  const [editAmt,     setEditAmt]     = useState(0);
  const [addlModal,   setAddlModal]   = useState(null); // additional proposal modal
  const [addlMonth,   setAddlMonth]   = useState("");
  const [addlAmt,     setAddlAmt]     = useState(0);
  const [expandedKeys,setExpandedKeys]= useState({}); // doctorKey → bool (show addl rows)

  const periodReady = month && year;

  // Get primary proposal for a doctor in the selected year
  const getPrimary = useCallback((doctorKey) => {
    if (!year) return null;
    return Object.values(proposals).find(p =>
      p.doctorKey===doctorKey &&
      p.type!=="additional" &&
      (p.year||"FY 2026-27")===year
    );
  }, [proposals, year]);

  // Get all proposals for a doctor in the selected year
  const getAllProposals = useCallback((doctorKey) => {
    if (!year) return [];
    return Object.values(proposals).filter(p =>
      p.doctorKey===doctorKey && (p.year||"FY 2026-27")===year
    );
  }, [proposals, year]);

  // Pending count per HQ — doctor with crm26>0 and no primary proposal for year
  const pendingCount = useMemo(() => {
    if (!year) return {};
    const primaryKeys = new Set(
      Object.values(proposals)
        .filter(p => p.type!=="additional" && (p.year||"FY 2026-27")===year)
        .map(p => p.doctorKey)
    );
    const counts = {};
    HQ_LIST.forEach(hq => {
      counts[hq] = DOCTOR_MASTER.filter(d=>d.hq===hq && d.crm26>0 && !primaryKeys.has(d.name+"___"+d.hq)).length;
    });
    return counts;
  }, [proposals, year]);

  const doctors = useMemo(() => {
    let list = DOCTOR_MASTER;
    if (hqFilter) list = list.filter(d=>d.hq===hqFilter);
    if (search)   list = list.filter(d=>d.name.toLowerCase().includes(search.toLowerCase()));
    if (showPending && year) {
      const primaryKeys = new Set(
        Object.values(proposals)
          .filter(p=>p.type!=="additional"&&(p.year||"FY 2026-27")===year)
          .map(p=>p.doctorKey)
      );
      list = list.filter(d => d.crm26>0 && !primaryKeys.has(d.name+"___"+d.hq));
    }
    return list;
  }, [hqFilter, search, showPending, proposals, year]);

  const selectedKeys = Object.keys(selected).filter(k=>selected[k]);
  const toggleSelect = (key) => setSelected(prev=>({...prev,[key]:!prev[key]}));
  const selectAll    = () => { const s={}; doctors.forEach(d=>{s[d.name+"___"+d.hq]=true;}); setSelected(s); };
  const deselectAll  = () => setSelected({});

  const openBulk = () => {
    const amts = {};
    selectedKeys.forEach(k => {
      const doc = DOCTOR_MASTER.find(d=>d.name+"___"+d.hq===k);
      const primary = getPrimary(k);
      amts[k] = primary?.entries?.[0]?.proposed || doc?.crm26 || 0;
    });
    setBulkAmts(amts);
    setBulkModal(true);
  };

  const submitBulk = () => {
    selectedKeys.forEach(k => {
      const amt = Number(bulkAmts[k]||0);
      onSave(k, [{proposed:amt,issued:amt}], month, year, "primary");
    });
    setSelected({}); setBulkModal(false);
    notify(`${selectedKeys.length} proposals saved!`);
  };

  const openEdit = (doc) => {
    const key = doc.name+"___"+doc.hq;
    const primary = getPrimary(key);
    setEditModal(doc);
    setEditAmt(primary?.entries?.[0]?.proposed || doc.crm26 || 0);
  };

  const submitEdit = () => {
    const key = editModal.name+"___"+editModal.hq;
    onSave(key, [{proposed:Number(editAmt),issued:Number(editAmt)}], month, year, "primary");
    setEditModal(null);
  };

  const openAddl = (doc) => {
    setAddlModal(doc);
    setAddlMonth(month||curMonth());
    setAddlAmt(doc.crm26||0);
  };

  const submitAddl = () => {
    const key = addlModal.name+"___"+addlModal.hq;
    onSave(key, [{proposed:Number(addlAmt),issued:Number(addlAmt)}], addlMonth, year, "additional");
    setAddlModal(null);
    notify("Additional proposal added!");
  };

  const handleWithdraw = (pid, docName) => {
    setConfirm({
      msg:`Withdraw proposal for "${docName}"? This cannot be undone.`,
      okLabel:"Withdraw",
      onOk:()=>onWithdraw(pid)
    });
  };

  return (
    <div>
      <h1 className="text-xl font-black text-slate-800 mb-1">Propose CRM</h1>
      <p className="text-sm text-slate-400 mb-4">Select period, then propose for doctors</p>

      {/* Single edit modal */}
      {editModal && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:"rgba(15,23,42,0.65)"}}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md">
            <div className="px-6 pt-5 pb-4 border-b border-slate-100">
              <h2 className="font-black text-slate-800">Primary Proposal</h2>
              <p className="text-xs text-slate-400 mt-0.5">{editModal.name} · {editModal.hq} · {month} {year}</p>
            </div>
            <div className="px-6 py-4 space-y-3">
              <div className="bg-slate-50 rounded-xl p-3 text-xs text-slate-500 space-y-1">
                <div className="flex justify-between"><span>CRM25 Actual</span><strong>{inr(editModal.crm25_act)}</strong></div>
                <div className="flex justify-between"><span>Plan CRM26 (Annual)</span><strong className="text-blue-600">{inr(editModal.crm26)}</strong></div>
                <div className="flex justify-between"><span>Plan Sales26/mo</span><strong>{inr(editModal.sales26)}</strong></div>
              </div>
              {getPrimary(editModal.name+"___"+editModal.hq) && (
                <div className="text-xs px-3 py-2 rounded-lg font-semibold bg-amber-100 text-amber-700">
                  Existing Primary: {getPrimary(editModal.name+"___"+editModal.hq)?.status} · {getPrimary(editModal.name+"___"+editModal.hq)?.month} · {inr(getPrimary(editModal.name+"___"+editModal.hq)?.entries?.[0]?.proposed)}
                </div>
              )}
              <div>
                <label className="text-xs font-bold text-slate-400 uppercase tracking-widest block mb-1.5">Proposed CRM Amount (₹)</label>
                <input type="number" value={editAmt} onChange={e=>setEditAmt(e.target.value)}
                  className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/>
              </div>
            </div>
            <div className="flex gap-3 px-6 pb-5">
              <button onClick={()=>setEditModal(null)} className="flex-1 py-2.5 bg-slate-100 text-slate-700 rounded-xl text-sm font-bold">Cancel</button>
              <button onClick={submitEdit} className="flex-1 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700">
                {getPrimary(editModal.name+"___"+editModal.hq) ? "Update Primary" : "Submit Primary"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Additional proposal modal */}
      {addlModal && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:"rgba(15,23,42,0.65)"}}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md">
            <div className="px-6 pt-5 pb-4 border-b border-slate-100">
              <h2 className="font-black text-slate-800">Additional Proposal</h2>
              <p className="text-xs text-slate-400 mt-0.5">{addlModal.name} · {addlModal.hq} · {year}</p>
            </div>
            <div className="px-6 py-4 space-y-3">
              <div className="bg-blue-50 rounded-xl p-3 text-xs text-blue-700 font-semibold">
                This will be added alongside the primary proposal. Total = Primary + Additional.
              </div>
              <div>
                <label className="text-xs font-bold text-slate-400 uppercase tracking-widest block mb-1.5">Month</label>
                <select value={addlMonth} onChange={e=>setAddlMonth(e.target.value)}
                  className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 bg-white">
                  {MONTHS.map(m=><option key={m}>{m}</option>)}
                </select>
              </div>
              <div>
                <label className="text-xs font-bold text-slate-400 uppercase tracking-widest block mb-1.5">Additional CRM Amount (₹)</label>
                <input type="number" value={addlAmt} onChange={e=>setAddlAmt(e.target.value)}
                  className="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"/>
              </div>
            </div>
            <div className="flex gap-3 px-6 pb-5">
              <button onClick={()=>setAddlModal(null)} className="flex-1 py-2.5 bg-slate-100 text-slate-700 rounded-xl text-sm font-bold">Cancel</button>
              <button onClick={submitAddl} className="flex-1 py-2.5 bg-indigo-600 text-white rounded-xl text-sm font-bold hover:bg-indigo-700">Add Proposal</button>
            </div>
          </div>
        </div>
      )}

      {/* Bulk modal */}
      {bulkModal && (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:"rgba(15,23,42,0.65)"}}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[85vh] flex flex-col">
            <div className="px-6 pt-5 pb-4 border-b border-slate-100 shrink-0">
              <h2 className="font-black text-slate-800">Bulk Propose — {selectedKeys.length} Doctors</h2>
              <p className="text-xs text-slate-400 mt-0.5">{month} {year} · Primary proposals</p>
            </div>
            <div className="overflow-y-auto flex-1 px-6 py-4 space-y-2">
              {selectedKeys.map(k=>{
                const doc=DOCTOR_MASTER.find(d=>d.name+"___"+d.hq===k);
                return (
                  <div key={k} className="flex items-center gap-3 py-2 border-b border-slate-50">
                    <div className="flex-1 min-w-0">
                      <p className="font-semibold text-slate-800 text-sm truncate">{doc?.name}</p>
                      <p className="text-xs text-slate-400">{doc?.hq} · Plan: {inr(doc?.crm26)}</p>
                    </div>
                    <input type="number" value={bulkAmts[k]||0}
                      onChange={e=>setBulkAmts(prev=>({...prev,[k]:e.target.value}))}
                      className="w-28 px-2 py-1.5 border border-slate-200 rounded-lg text-sm text-right focus:outline-none focus:ring-2 focus:ring-blue-300"/>
                  </div>
                );
              })}
            </div>
            <div className="px-6 py-4 border-t border-slate-100 shrink-0">
              <div className="flex justify-between items-center mb-3">
                <span className="text-xs text-slate-500 font-semibold">Total</span>
                <span className="font-black text-blue-700">{inr(Object.values(bulkAmts).reduce((s,v)=>s+Number(v||0),0))}</span>
              </div>
              <div className="flex gap-3">
                <button onClick={()=>setBulkModal(false)} className="flex-1 py-2.5 bg-slate-100 text-slate-700 rounded-xl text-sm font-bold">Cancel</button>
                <button onClick={submitBulk} className="flex-1 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700">Submit All</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Period selector */}
      <div className={`rounded-2xl p-4 mb-4 border-2 ${periodReady?"bg-blue-50 border-blue-200":"bg-amber-50 border-amber-300"}`}>
        <div className="flex flex-wrap gap-3 items-center">
          <span className={`text-xs font-black uppercase tracking-widest ${periodReady?"text-blue-700":"text-amber-700"}`}>
            {periodReady?"📅 Proposing for:":"⚠️ Select period to continue:"}
          </span>
          <select value={month} onChange={e=>setMonth(e.target.value)}
            className={`px-3 py-2 border-2 rounded-xl text-sm font-bold focus:outline-none bg-white ${periodReady?"border-blue-300 text-blue-800":"border-amber-400 text-amber-800"}`}>
            <option value="">— Month —</option>
            {MONTHS.map(m=><option key={m}>{m}</option>)}
          </select>
          <select value={year} onChange={e=>setYear(e.target.value)}
            className={`px-3 py-2 border-2 rounded-xl text-sm font-bold focus:outline-none bg-white ${periodReady?"border-blue-300 text-blue-800":"border-amber-400 text-amber-800"}`}>
            <option value="">— Year —</option>
            {YEARS.map(y=><option key={y}>{y}</option>)}
          </select>
          {periodReady && <span className="text-xs text-blue-500 font-semibold">Primary proposals tagged to {year}</span>}
        </div>
      </div>

      {!periodReady ? (
        <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-12 text-center">
          <div className="text-4xl mb-3">📅</div>
          <p className="font-bold text-slate-400">Select Month and Year above to view doctors</p>
        </div>
      ) : (
        <>
          <div className="flex flex-wrap gap-2 mb-3">
            <select value={hqFilter} onChange={e=>setHqFilter(e.target.value)}
              className="px-3 py-1.5 border border-slate-200 rounded-xl text-xs bg-white focus:outline-none">
              <option value="">All HQs</option>
              {HQ_LIST.map(h=>(
                <option key={h} value={h}>{h}{pendingCount[h]>0?` (${pendingCount[h]} pending)`:""}</option>
              ))}
            </select>
            <input placeholder="Search doctor…" value={search} onChange={e=>setSearch(e.target.value)}
              className="flex-1 min-w-32 px-3 py-1.5 border border-slate-200 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-blue-300"/>
            <button onClick={()=>setShowPending(!showPending)}
              className={`px-3 py-1.5 rounded-xl text-xs font-bold border ${showPending?"bg-red-600 text-white border-red-600":"bg-white text-slate-500 border-slate-200"}`}>
              ⏳ {showPending?"Show All":"Pending Only"}
            </button>
            <button onClick={selectAll} className="px-3 py-1.5 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-500">Select All</button>
            {selectedKeys.length>0 && <button onClick={deselectAll} className="px-3 py-1.5 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-400">Clear</button>}
          </div>

          {selectedKeys.length>0 && (
            <div className="bg-blue-600 text-white rounded-xl px-4 py-2.5 mb-3 flex items-center justify-between">
              <span className="text-sm font-bold">{selectedKeys.length} selected</span>
              <button onClick={openBulk} className="bg-white text-blue-600 px-3 py-1 rounded-lg text-xs font-black">Propose Selected ({selectedKeys.length}) →</button>
            </div>
          )}

          <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead className="bg-slate-50 border-b border-slate-100">
                  <tr>
                    <th className="px-3 py-2.5"><input type="checkbox" onChange={e=>e.target.checked?selectAll():deselectAll()} className="rounded"/></th>
                    {["HQ","Doctor","CRM25","Plan CRM26","Primary Proposal","Total Proposed","Actions"].map(h=>(
                      <th key={h} className="px-3 py-2.5 text-left text-xs font-bold uppercase text-slate-400">{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-50">
                  {doctors.map(doc=>{
                    const key = doc.name+"___"+doc.hq;
                    const primary   = getPrimary(key);
                    const allP      = getAllProposals(key);
                    const addlProps = allP.filter(p=>p.type==="additional");
                    const totalProposed = allP.reduce((s,p)=>s+Number(p.entries?.[0]?.proposed||0),0);
                    const isSelected = !!selected[key];
                    const canWithdraw = primary && primary.status===STATUSES.PROPOSED;
                    const sc = primary ? STATUS_COLORS[primary.status] : null;
                    const isExpanded = !!expandedKeys[key];
                    return (
                      <React.Fragment key={key}>
                        <tr className={`hover:bg-slate-50 ${isSelected?"bg-blue-50":""}`}>
                          <td className="px-3 py-2.5">
                            <input type="checkbox" checked={isSelected} onChange={()=>toggleSelect(key)} className="rounded"/>
                          </td>
                          <td className="px-3 py-2.5 text-xs text-slate-400">{doc.hq}</td>
                          <td className="px-3 py-2.5 font-semibold text-slate-800 text-xs">{doc.name}</td>
                          <td className="px-3 py-2.5 text-xs text-slate-500">{doc.crm25_act>0?inr(doc.crm25_act):"—"}</td>
                          <td className="px-3 py-2.5 font-bold text-blue-700 text-xs">{doc.crm26>0?inr(doc.crm26):"—"}</td>
                          <td className="px-3 py-2.5">
                            {primary
                              ?<div className="flex items-center gap-1 flex-wrap">
                                <span className={`px-1.5 py-0.5 rounded-full text-xs font-bold ${sc.bg} ${sc.text}`}>{primary.status}</span>
                                <span className="text-xs text-slate-500">{primary.month} · {inr(primary.entries?.[0]?.proposed)}</span>
                                {addlProps.length>0&&(
                                  <button
                                    onClick={()=>setExpandedKeys(prev=>({...prev,[key]:!prev[key]}))}
                                    className={`px-1.5 py-0.5 rounded-full text-xs font-bold cursor-pointer transition-colors ${isExpanded?"bg-indigo-600 text-white":"bg-indigo-100 text-indigo-700 hover:bg-indigo-200"}`}>
                                    {isExpanded?"▲":"▼"} +{addlProps.length} addl
                                  </button>
                                )}
                              </div>
                              :<span className="text-slate-300 text-xs">— Pending</span>}
                          </td>
                          <td className="px-3 py-2.5 font-bold text-slate-700 text-xs">
                            {totalProposed>0?inr(totalProposed):<span className="text-slate-300">—</span>}
                          </td>
                          <td className="px-3 py-2.5">
                            <div className="flex gap-1 flex-wrap">
                              {!primary&&(
                                <button onClick={()=>openEdit(doc)}
                                  className="px-2.5 py-1 bg-blue-600 text-white text-xs font-bold rounded-lg">Propose</button>
                              )}
                              {primary&&primary.status===STATUSES.PROPOSED&&(
                                <button onClick={()=>openEdit(doc)}
                                  className="px-2.5 py-1 bg-slate-100 text-slate-600 text-xs font-bold rounded-lg">Edit</button>
                              )}
                              {primary&&(
                                <button onClick={()=>openAddl(doc)}
                                  className="px-2.5 py-1 bg-indigo-100 text-indigo-700 text-xs font-bold rounded-lg">+ Add</button>
                              )}
                              {canWithdraw&&(
                                <button onClick={()=>handleWithdraw(primary.id, doc.name)}
                                  className="px-2.5 py-1 bg-red-50 text-red-500 text-xs font-bold rounded-lg border border-red-200">✕</button>
                              )}
                              {primary&&!canWithdraw&&(
                                <span className="text-xs text-slate-300 font-semibold">Locked</span>
                              )}
                            </div>
                          </td>
                        </tr>
                        {/* Expanded additional proposals rows */}
                        {isExpanded && addlProps.map((ap,idx)=>{
                          const apSc = STATUS_COLORS[ap.status];
                          const canWithdrawAddl = ap.status===STATUSES.PROPOSED;
                          return (
                            <tr key={ap.id} className="bg-indigo-50 border-l-4 border-indigo-300">
                              <td className="px-3 py-2"></td>
                              <td colSpan={2} className="px-3 py-2">
                                <div className="flex items-center gap-2">
                                  <span className="text-xs font-bold text-indigo-500 uppercase tracking-wider">↳ Additional {idx+1}</span>
                                </div>
                              </td>
                              <td className="px-3 py-2 text-xs text-slate-400">{ap.month}</td>
                              <td className="px-3 py-2 font-bold text-indigo-700 text-xs">{inr(ap.entries?.[0]?.proposed)}</td>
                              <td className="px-3 py-2">
                                <span className={`px-1.5 py-0.5 rounded-full text-xs font-bold ${apSc.bg} ${apSc.text}`}>{ap.status}</span>
                              </td>
                              <td className="px-3 py-2"></td>
                              <td className="px-3 py-2">
                                {canWithdrawAddl ? (
                                  <button
                                    onClick={()=>setConfirm({
                                      msg:`Withdraw additional proposal for "${doc.name}" (${ap.month} · ${inr(ap.entries?.[0]?.proposed)})?`,
                                      okLabel:"Withdraw",
                                      onOk:()=>onWithdraw(ap.id)
                                    })}
                                    className="px-2.5 py-1 bg-red-50 text-red-500 text-xs font-bold rounded-lg border border-red-200 hover:bg-red-100">
                                    ✕ Remove
                                  </button>
                                ) : (
                                  <span className="text-xs text-slate-300 font-semibold">Locked</span>
                                )}
                              </td>
                            </tr>
                          );
                        })}
                      </React.Fragment>
                    );
                  })}
                </tbody>
              </table>
            </div>
            {doctors.length===0&&<div className="text-center py-10 text-slate-300 text-sm">No doctors found</div>}
          </div>
        </>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   MY PROPOSALS VIEW
══════════════════════════════════════════════════════ */
function MyProposalsView({myProposals, onWithdraw, setConfirm}) {
  const [filterStatus, setFilterStatus] = useState("all");
  const [filterMonth,  setFilterMonth]  = useState("");
  const [filterHQ,     setFilterHQ]     = useState("");
  const [filterType,   setFilterType]   = useState("all"); // all | primary | additional
  const [search,       setSearch]       = useState("");

  const filtered = useMemo(() => myProposals.filter(p => {
    if (filterStatus!=="all" && p.status!==filterStatus) return false;
    if (filterMonth && p.month!==filterMonth) return false;
    if (filterType!=="all") {
      if (filterType==="primary"    && p.type==="additional") return false;
      if (filterType==="additional" && p.type!=="additional") return false;
    }
    if (filterHQ) {
      const doc = DOCTOR_MASTER.find(d=>d.name+"___"+d.hq===p.doctorKey);
      if (doc?.hq!==filterHQ) return false;
    }
    if (search) {
      const doc = DOCTOR_MASTER.find(d=>d.name+"___"+d.hq===p.doctorKey);
      if (!doc?.name.toLowerCase().includes(search.toLowerCase())) return false;
    }
    return true;
  }), [myProposals, filterStatus, filterMonth, filterHQ, filterType, search]);

  const counts = {all:myProposals.length,Proposed:0,Approved:0,Confirmed:0};
  myProposals.forEach(p=>counts[p.status]++);

  const groupedRows = useMemo(() => {
    const g = {};
    filtered.forEach(p=>{
      const k=`${p.month} ${p.year||"FY 2026-27"}`;
      if(!g[k]) g[k]=[];
      g[k].push(p);
    });
    return g;
  }, [filtered]);

  const monthSubtotals = useMemo(() => {
    const mt={};
    filtered.forEach(p=>{
      const k=`${p.month} ${p.year||"FY 2026-27"}`;
      mt[k]=(mt[k]||0)+Number(p.entries?.[0]?.proposed||0);
    });
    return mt;
  }, [filtered]);

  const grandTotal = filtered.reduce((s,p)=>s+Number(p.entries?.[0]?.proposed||0),0);

  const handleWithdraw = (p) => {
    const doc = DOCTOR_MASTER.find(d=>d.name+"___"+d.hq===p.doctorKey);
    setConfirm({
      msg:`Withdraw ${p.type==="additional"?"additional":"primary"} proposal for "${doc?.name}"?`,
      okLabel:"Withdraw",
      onOk:()=>onWithdraw(p.id)
    });
  };

  return (
    <div>
      <h1 className="text-xl font-black text-slate-800 mb-1">My Proposals</h1>
      <p className="text-sm text-slate-400 mb-4">All CRM proposals submitted by you</p>

      <div className="flex gap-2 mb-3 flex-wrap">
        {[["all","All",counts.all],["Proposed","Proposed",counts.Proposed],["Approved","Approved",counts.Approved],["Confirmed","Confirmed",counts.Confirmed]].map(([v,l,c])=>(
          <button key={v} onClick={()=>setFilterStatus(v)}
            className={`px-3 py-1.5 rounded-xl text-xs font-bold border ${filterStatus===v?"bg-blue-600 text-white border-blue-600":"bg-white text-slate-500 border-slate-200"}`}>
            {l} ({c})
          </button>
        ))}
      </div>

      <div className="flex gap-2 mb-4 flex-wrap items-center">
        <input placeholder="Search doctor…" value={search} onChange={e=>setSearch(e.target.value)}
          className="px-3 py-1.5 border border-slate-200 rounded-xl text-xs bg-white focus:outline-none focus:ring-2 focus:ring-blue-300 min-w-36"/>
        <select value={filterMonth} onChange={e=>setFilterMonth(e.target.value)}
          className="px-3 py-1.5 border border-slate-200 rounded-xl text-xs bg-white focus:outline-none">
          <option value="">All Months</option>{MONTHS.map(m=><option key={m}>{m}</option>)}
        </select>
        <select value={filterHQ} onChange={e=>setFilterHQ(e.target.value)}
          className="px-3 py-1.5 border border-slate-200 rounded-xl text-xs bg-white focus:outline-none">
          <option value="">All HQs</option>{HQ_LIST.map(h=><option key={h}>{h}</option>)}
        </select>
        <select value={filterType} onChange={e=>setFilterType(e.target.value)}
          className="px-3 py-1.5 border border-slate-200 rounded-xl text-xs bg-white focus:outline-none">
          <option value="all">All Types</option>
          <option value="primary">Primary</option>
          <option value="additional">Additional</option>
        </select>
        {(filterMonth||filterHQ||search||filterType!=="all")&&(
          <button onClick={()=>{setFilterMonth("");setFilterHQ("");setSearch("");setFilterType("all");}}
            className="px-3 py-1.5 border border-slate-200 rounded-xl text-xs text-slate-400 hover:text-red-500 bg-white">✕ Clear</button>
        )}
        {filtered.length>0&&(
          <div className="ml-auto flex items-center gap-1.5 bg-indigo-50 border border-indigo-100 rounded-xl px-3 py-1.5">
            <span className="text-xs text-indigo-500 font-semibold">Filtered Total:</span>
            <span className="text-sm font-black text-indigo-700">{inr(grandTotal)}</span>
          </div>
        )}
      </div>

      <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 border-b border-slate-100">
              <tr>{["Doctor","HQ","Type","Month","Year","Proposed","Status","On","Action"].map(h=>(
                <th key={h} className="px-3 py-2.5 text-left text-xs font-bold uppercase text-slate-400">{h}</th>
              ))}</tr>
            </thead>
            <tbody className="divide-y divide-slate-50">
              {Object.entries(groupedRows).map(([monthKey, props])=>(
                <React.Fragment key={monthKey}>
                  {props.map(p=>{
                    const doc=DOCTOR_MASTER.find(d=>d.name+"___"+d.hq===p.doctorKey);
                    const sc=STATUS_COLORS[p.status];
                    const isAddl=p.type==="additional";
                    const canWithdraw=p.status===STATUSES.PROPOSED;
                    return (
                      <tr key={p.id} className="hover:bg-slate-50">
                        <td className="px-3 py-2.5 font-semibold text-slate-800 text-xs">{doc?.name||p.doctorKey}</td>
                        <td className="px-3 py-2.5 text-xs text-slate-400">{doc?.hq}</td>
                        <td className="px-3 py-2.5">
                          <span className={`px-1.5 py-0.5 rounded-full text-xs font-bold ${isAddl?"bg-indigo-100 text-indigo-700":"bg-slate-100 text-slate-600"}`}>
                            {isAddl?"Additional":"Primary"}
                          </span>
                        </td>
                        <td className="px-3 py-2.5 text-xs text-slate-500">{p.month}</td>
                        <td className="px-3 py-2.5 text-xs text-slate-400">{p.year||"FY 2026-27"}</td>
                        <td className="px-3 py-2.5 font-bold text-slate-700">{inr(p.entries?.[0]?.proposed)}</td>
                        <td className="px-3 py-2.5"><span className={`px-1.5 py-0.5 rounded-full text-xs font-bold ${sc.bg} ${sc.text}`}>{p.status}</span></td>
                        <td className="px-3 py-2.5 text-xs text-slate-400">{p.proposedAt}</td>
                        <td className="px-3 py-2.5">
                          {canWithdraw&&(
                            <button onClick={()=>handleWithdraw(p)}
                              className="px-2 py-1 bg-red-50 text-red-500 text-xs font-bold rounded-lg border border-red-200 hover:bg-red-100">
                              Withdraw
                            </button>
                          )}
                          {!canWithdraw&&<span className="text-xs text-slate-300">Locked</span>}
                        </td>
                      </tr>
                    );
                  })}
                  <tr className="bg-slate-50 border-t border-slate-200">
                    <td colSpan={5} className="px-3 py-2 text-xs font-black text-slate-500">Sub-total · {monthKey} ({props.length})</td>
                    <td className="px-3 py-2 font-black text-blue-700">{inr(monthSubtotals[monthKey])}</td>
                    <td colSpan={3}></td>
                  </tr>
                </React.Fragment>
              ))}
            </tbody>
            {filtered.length>0&&(
              <tfoot>
                <tr className="bg-blue-50 border-t-2 border-blue-200">
                  <td colSpan={5} className="px-3 py-3 text-xs font-black text-blue-800">Grand Total ({filtered.length})</td>
                  <td className="px-3 py-3 font-black text-blue-700">{inr(grandTotal)}</td>
                  <td colSpan={3}></td>
                </tr>
              </tfoot>
            )}
          </table>
        </div>
        {filtered.length===0&&<div className="text-center py-10 text-slate-300 text-sm">No proposals found</div>}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   APPROVE VIEW
══════════════════════════════════════════════════════ */
function ApproveView({proposals, proposalList, onApprove, onReject, onConfirm, onWithdraw, setConfirm}) {
  const [tab,         setTab]         = useState("pending");
  const [hqFilter,    setHqFilter]    = useState("");
  const [monthFilter, setMonthFilter] = useState("");
  const [issuedAmts,  setIssuedAmts]  = useState({});
  const [selected,    setSelected]    = useState({}); // pid → bool

  const getDoc = (key) => DOCTOR_MASTER.find(d=>d.name+"___"+d.hq===key);
  const statusMap = {pending:"Proposed",approved:"Approved",confirmed:"Confirmed",all:null};

  const filtered = useMemo(() => {
    let list = proposalList;
    if (tab!=="all") list = list.filter(p=>p.status===statusMap[tab]);
    if (hqFilter)    list = list.filter(p=>getDoc(p.doctorKey)?.hq===hqFilter);
    if (monthFilter) list = list.filter(p=>p.month===monthFilter);
    return list;
  }, [proposalList, tab, hqFilter, monthFilter]);

  const tabCounts = useMemo(()=>({
    pending:   proposalList.filter(p=>p.status==="Proposed").length,
    approved:  proposalList.filter(p=>p.status==="Approved").length,
    confirmed: proposalList.filter(p=>p.status==="Confirmed").length,
    all:       proposalList.length
  }), [proposalList]);

  // Reset selection when tab/filter changes
  useEffect(()=>setSelected({}), [tab, hqFilter, monthFilter]);

  const selectedPids   = Object.keys(selected).filter(k=>selected[k]);
  const selectedProposals = selectedPids.map(pid=>proposalList.find(p=>p.id===pid)).filter(Boolean);
  const selectedTotal  = selectedProposals.reduce((s,p)=>s+Number(p.entries?.[0]?.proposed||0),0);

  const toggleSelect  = (pid) => setSelected(prev=>({...prev,[pid]:!prev[pid]}));
  const selectAll     = () => { const s={}; filtered.forEach(p=>{s[p.id]=true;}); setSelected(s); };
  const deselectAll   = () => setSelected({});

  // Single actions — no dialog
  const handleApprove    = (pid) => onApprove(pid);
  const handleConfirm    = (p)   => {
    const issued = issuedAmts[p.id]!==undefined ? Number(issuedAmts[p.id]) : Number(p.entries?.[0]?.proposed||0);
    onConfirm(p.id,[{issued,proposed:p.entries?.[0]?.proposed}]);
  };
  const handleUnconfirm  = (pid) => {
    const p = proposalList.find(x=>x.id===pid); if(!p) return;
    // revert Confirmed → Approved
    onConfirm(pid, null, true); // pass revert flag
  };

  // Bulk actions — with confirm dialog
  const bulkApprove = () => {
    const pending = selectedProposals.filter(p=>p.status===STATUSES.PROPOSED);
    if (!pending.length) return;
    setConfirm({
      msg:`Approve ${pending.length} proposal${pending.length>1?"s":""} totalling ${inr(pending.reduce((s,p)=>s+Number(p.entries?.[0]?.proposed||0),0))}?`,
      okLabel:`Approve ${pending.length}`,
      onOk:()=>{ pending.forEach(p=>onApprove(p.id)); setSelected({}); }
    });
  };

  const bulkConfirm = () => {
    const approved = selectedProposals.filter(p=>p.status===STATUSES.APPROVED);
    if (!approved.length) return;
    setConfirm({
      msg:`Confirm & issue ${approved.length} proposal${approved.length>1?"s":""} totalling ${inr(approved.reduce((s,p)=>s+Number(p.entries?.[0]?.proposed||0),0))}?`,
      okLabel:`Confirm ${approved.length}`,
      onOk:()=>{ approved.forEach(p=>{ const issued=Number(p.entries?.[0]?.proposed||0); onConfirm(p.id,[{issued,proposed:p.entries?.[0]?.proposed}]); }); setSelected({}); }
    });
  };

  const bulkUnconfirm = () => {
    const confirmed = selectedProposals.filter(p=>p.status===STATUSES.CONFIRMED);
    if (!confirmed.length) return;
    setConfirm({
      msg:`Unconfirm ${confirmed.length} proposal${confirmed.length>1?"s":""} totalling ${inr(confirmed.reduce((s,p)=>s+Number(p.entries?.[0]?.proposed||0),0))}? They will revert to Approved.`,
      okLabel:`Unconfirm ${confirmed.length}`,
      onOk:()=>{ confirmed.forEach(p=>onConfirm(p.id, null, true)); setSelected({}); }
    });
  };

  // Bulk select helpers based on current tab
  const canBulkApprove   = selectedProposals.some(p=>p.status===STATUSES.PROPOSED);
  const canBulkConfirm   = selectedProposals.some(p=>p.status===STATUSES.APPROVED);
  const canBulkUnconfirm = selectedProposals.some(p=>p.status===STATUSES.CONFIRMED);

  return (
    <div>
      <h1 className="text-xl font-black text-slate-800 mb-1">Approve Proposals</h1>
      <p className="text-sm text-slate-400 mb-4">Review, approve and confirm CRM issuances</p>

      <div className="flex flex-wrap gap-2 mb-4">
        {[["pending","⏳ Pending"],["approved","✅ Approved"],["confirmed","🎯 Confirmed"],["all","All"]].map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)}
            className={`px-3 py-1.5 rounded-xl text-xs font-bold border ${tab===v?"bg-blue-600 text-white border-blue-600":"bg-white text-slate-500 border-slate-200"}`}>
            {l} ({tabCounts[v]})
          </button>
        ))}
        <select value={hqFilter} onChange={e=>setHqFilter(e.target.value)}
          className="px-3 py-1.5 border border-slate-200 rounded-xl text-xs bg-white focus:outline-none">
          <option value="">All HQs</option>{HQ_LIST.map(h=><option key={h}>{h}</option>)}
        </select>
        <select value={monthFilter} onChange={e=>setMonthFilter(e.target.value)}
          className="px-3 py-1.5 border border-slate-200 rounded-xl text-xs bg-white focus:outline-none">
          <option value="">All Months</option>{MONTHS.map(m=><option key={m}>{m}</option>)}
        </select>
      </div>

      {/* Bulk action bar */}
      {selectedPids.length>0 && (
        <div className="bg-slate-800 text-white rounded-xl px-4 py-3 mb-4 flex flex-wrap items-center gap-3">
          <span className="text-sm font-bold">{selectedPids.length} selected</span>
          <span className="text-xs text-slate-400 font-semibold">Total: <strong className="text-white">{inr(selectedTotal)}</strong></span>
          <div className="flex gap-2 ml-auto flex-wrap">
            {canBulkApprove && (
              <button onClick={bulkApprove}
                className="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-black rounded-lg">
                ✅ Approve Selected ({selectedProposals.filter(p=>p.status===STATUSES.PROPOSED).length}) — {inr(selectedProposals.filter(p=>p.status===STATUSES.PROPOSED).reduce((s,p)=>s+Number(p.entries?.[0]?.proposed||0),0))}
              </button>
            )}
            {canBulkConfirm && (
              <button onClick={bulkConfirm}
                className="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-black rounded-lg">
                🎯 Confirm Selected ({selectedProposals.filter(p=>p.status===STATUSES.APPROVED).length}) — {inr(selectedProposals.filter(p=>p.status===STATUSES.APPROVED).reduce((s,p)=>s+Number(p.entries?.[0]?.proposed||0),0))}
              </button>
            )}
            {canBulkUnconfirm && (
              <button onClick={bulkUnconfirm}
                className="px-3 py-1.5 bg-amber-500 hover:bg-amber-600 text-white text-xs font-black rounded-lg">
                ↩ Unconfirm Selected ({selectedProposals.filter(p=>p.status===STATUSES.CONFIRMED).length}) — {inr(selectedProposals.filter(p=>p.status===STATUSES.CONFIRMED).reduce((s,p)=>s+Number(p.entries?.[0]?.proposed||0),0))}
              </button>
            )}
            <button onClick={deselectAll} className="px-3 py-1.5 bg-slate-600 text-slate-300 text-xs font-bold rounded-lg">Clear</button>
          </div>
        </div>
      )}

      <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-slate-50 border-b border-slate-100">
              <tr>
                <th className="px-3 py-2.5">
                  <input type="checkbox"
                    checked={filtered.length>0 && filtered.every(p=>selected[p.id])}
                    onChange={e=>e.target.checked?selectAll():deselectAll()}
                    className="rounded"/>
                </th>
                {["Doctor","HQ","Type","Month","Year","Proposed","Status","Issued Amt","By","Action"].map(h=>(
                  <th key={h} className="px-3 py-2.5 text-left text-xs font-bold uppercase text-slate-400">{h}</th>
                ))}
              </tr>
            </thead>
            <tbody className="divide-y divide-slate-50">
              {filtered.map(p => {
                const doc = getDoc(p.doctorKey);
                const sc  = STATUS_COLORS[p.status];
                const proposed = p.entries?.[0]?.proposed||0;
                const confirmed_issued = p.issuedEntries?.[0]?.issued;
                const isSelected = !!selected[p.id];
                return (
                  <tr key={p.id} className={`hover:bg-slate-50 ${isSelected?"bg-blue-50":""}`}>
                    <td className="px-3 py-2.5">
                      <input type="checkbox" checked={isSelected} onChange={()=>toggleSelect(p.id)} className="rounded"/>
                    </td>
                    <td className="px-3 py-2.5 font-semibold text-slate-800 text-xs">{doc?.name||"—"}</td>
                    <td className="px-3 py-2.5 text-xs text-slate-400">{doc?.hq}</td>
                    <td className="px-3 py-2.5">
                      <span className={`px-1.5 py-0.5 rounded-full text-xs font-bold ${p.type==="additional"?"bg-indigo-100 text-indigo-700":"bg-slate-100 text-slate-600"}`}>
                        {p.type==="additional"?"Addl":"Primary"}
                      </span>
                    </td>
                    <td className="px-3 py-2.5 text-xs text-slate-500">{p.month}</td>
                    <td className="px-3 py-2.5 text-xs text-slate-400">{p.year||"FY 2026-27"}</td>
                    <td className="px-3 py-2.5 font-bold text-slate-700">{inr(proposed)}</td>
                    <td className="px-3 py-2.5"><span className={`px-1.5 py-0.5 rounded-full text-xs font-bold ${sc.bg} ${sc.text}`}>{p.status}</span></td>
                    <td className="px-3 py-2.5">
                      {p.status===STATUSES.APPROVED?(
                        <input type="number" value={issuedAmts[p.id]!==undefined?issuedAmts[p.id]:proposed}
                          onChange={e=>setIssuedAmts(prev=>({...prev,[p.id]:e.target.value}))}
                          className="w-24 px-2 py-1 border border-slate-200 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-blue-300"/>
                      ):confirmed_issued?(
                        <span className="font-bold text-emerald-700">{inr(confirmed_issued)}</span>
                      ):<span className="text-slate-300">—</span>}
                    </td>
                    <td className="px-3 py-2.5 text-xs text-slate-400">{p.proposedBy?.split("@")[0]}</td>
                    <td className="px-3 py-2.5">
                      <div className="flex gap-1 flex-wrap">
                        {p.status===STATUSES.PROPOSED&&(
                          <>
                            <button onClick={()=>handleApprove(p.id)} className="px-2 py-1 bg-blue-600 text-white text-xs font-bold rounded-lg hover:bg-blue-700">Approve</button>
                            <button onClick={()=>setConfirm({msg:`Reject "${doc?.name}"?`,okLabel:"Reject",onOk:()=>onReject(p.id)})}
                              className="px-2 py-1 bg-slate-100 text-slate-500 text-xs font-bold rounded-lg">Reject</button>
                          </>
                        )}
                        {p.status===STATUSES.APPROVED&&(
                          <>
                            <button onClick={()=>handleConfirm(p)} className="px-2 py-1 bg-emerald-600 text-white text-xs font-bold rounded-lg hover:bg-emerald-700">Confirm</button>
                            <button onClick={()=>setConfirm({msg:`Undo approval for "${doc?.name}"?`,okLabel:"Undo",onOk:()=>onReject(p.id)})}
                              className="px-2 py-1 bg-slate-100 text-slate-400 text-xs font-bold rounded-lg">Undo</button>
                          </>
                        )}
                        {p.status===STATUSES.CONFIRMED&&(
                          <button onClick={()=>handleUnconfirm(p.id)}
                            className="px-2 py-1 bg-amber-100 text-amber-700 text-xs font-bold rounded-lg hover:bg-amber-200 border border-amber-200">
                            Unconfirm
                          </button>
                        )}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        {filtered.length===0&&<div className="text-center py-10 text-slate-300 text-sm">No proposals in this view</div>}
      </div>
    </div>
  );
}
