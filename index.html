/* ══════════════════════════════════════════════════════
   SALES TRACK VIEW
══════════════════════════════════════════════════════ */
function SalesTrackView({salesData, onSave, isAdmin, notify, setConfirm}) {
  const [hqFilter,    setHqFilter]    = useState("");
  const [monthFilter, setMonthFilter] = useState("");
  const [year,        setYear]        = useState("FY 2026-27");
  const [uploading,   setUploading]   = useState(false);
  const [uploadMode,  setUploadMode]  = useState("sku"); // sku | value
  const fileRef = useRef();

  // salesData structure: { "FY 2026-27": { "doctorKey": { "Apr": 12345, "May": 6789 } } }
  const yearData = salesData[year] || {};

  const getActual = (doctorKey, month) => yearData[doctorKey]?.[month] || 0;

  const handleFileUpload = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setUploading(true);
    try {
      const buf = await file.arrayBuffer();
      const wb  = XLSX.read(buf, {type:"array"});
      const ws  = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:""});

      const newYearData = JSON.parse(JSON.stringify(yearData)); // deep clone

      if (uploadMode==="sku") {
        // Columns: HQ, Doctor Name, Month, Product Name, Qty
        rows.forEach(row => {
          const hq      = String(row["HQ"]||row["hq"]||row["Hq"]||"").trim();
          const name    = String(row["Doctor Name"]||row["DOCTOR NAME"]||row["doctor name"]||row["Doctor"]||"").trim();
          const month   = String(row["Month"]||row["MONTH"]||row["month"]||"").trim();
          const product = String(row["Product Name"]||row["PRODUCT NAME"]||row["Product"]||row["product"]||"").trim();
          const qty     = Number(row["Qty"]||row["QTY"]||row["qty"]||row["Quantity"]||0);
          if (!name||!month||!product||qty<=0) return;
          const ptr = getPTR(product);
          if (ptr<=0) return;
          const value = Math.round(qty * ptr);
          const key   = name+"___"+hq;
          if (!newYearData[key]) newYearData[key]={};
          newYearData[key][month] = (newYearData[key][month]||0) + value;
        });
      } else {
        // Value mode: Columns: HQ, Doctor Name, + month columns (Apr, May, ...)
        rows.forEach(row => {
          const hq   = String(row["HQ"]||row["hq"]||"").trim();
          const name = String(row["Doctor Name"]||row["Doctor"]||row["DOCTOR NAME"]||"").trim();
          if (!name) return;
          const key = name+"___"+hq;
          MONTHS.forEach(m => {
            const val = Number(row[m]||row[m.toUpperCase()]||0);
            if (val > 0) {
              if (!newYearData[key]) newYearData[key]={};
              // SKU overrides value — only set if no SKU data present
              // We mark value-mode entries with _src suffix check (simple: just set if 0)
              if (!newYearData[key][m]) newYearData[key][m] = val;
            }
          });
        });
      }

      const newSalesData = {...salesData, [year]: newYearData};
      onSave(newSalesData);
      notify(`✅ Sales data uploaded (${uploadMode==="sku"?"SKU-wise":"Value-wise"})`);
    } catch(err) {
      console.error(err);
      notify("Upload failed — check file format","red");
    } finally {
      setUploading(false);
      if (fileRef.current) fileRef.current.value="";
    }
  };

  const clearData = () => {
    setConfirm({
      msg:`Clear all sales data for ${year}? This cannot be undone.`,
      okLabel:"Clear All",
      onOk:() => {
        const newSalesData = {...salesData};
        delete newSalesData[year];
        onSave(newSalesData);
        notify("Sales data cleared","red");
      }
    });
  };

  // Filtered doctors
  const doctors = useMemo(() => {
    let list = DOCTOR_MASTER;
    if (hqFilter) list = list.filter(d=>d.hq===hqFilter);
    return list;
  }, [hqFilter]);

  // Months to display — either filtered single month or all uploaded months
  const uploadedMonths = useMemo(() => {
    const ms = new Set();
    Object.values(yearData).forEach(d => Object.keys(d).forEach(m=>ms.add(m)));
    return MONTHS.filter(m=>ms.has(m));
  }, [yearData]);

  const displayMonths = monthFilter ? [monthFilter] : uploadedMonths;

  return (
    <div>
      <h1 className="text-xl font-black text-slate-800 mb-1">Sales Track</h1>
      <p className="text-sm text-slate-400 mb-4">Doctor-wise actual vs plan PTR tracking</p>

      {/* Upload section */}
      <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-4 mb-4">
        <h3 className="font-black text-slate-700 text-sm mb-3">📥 Upload Sales Data</h3>
        <div className="flex flex-wrap gap-3 items-center">
          <select value={year} onChange={e=>setYear(e.target.value)}
            className="px-3 py-2 border border-slate-200 rounded-xl text-sm bg-white focus:outline-none font-semibold">
            {YEARS.map(y=><option key={y}>{y}</option>)}
          </select>
          <div className="flex gap-1 bg-slate-100 p-1 rounded-xl">
            {[["sku","📦 SKU-wise"],["value","💰 Value-wise"]].map(([v,l])=>(
              <button key={v} onClick={()=>setUploadMode(v)}
                className={`px-3 py-1.5 rounded-lg text-xs font-semibold ${uploadMode===v?"bg-white text-blue-700 shadow-sm":"text-slate-500"}`}>{l}</button>
            ))}
          </div>
          <label className={`px-4 py-2 rounded-xl text-sm font-bold cursor-pointer transition-colors ${uploading?"bg-slate-200 text-slate-400":"bg-blue-600 hover:bg-blue-700 text-white"}`}>
            {uploading?"Uploading…":"📤 Upload Excel"}
            <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" className="hidden" onChange={handleFileUpload} disabled={uploading}/>
          </label>
          {isAdmin && Object.keys(yearData).length>0 && (
            <button onClick={clearData} className="px-3 py-2 text-xs font-bold text-red-500 border border-red-200 rounded-xl hover:bg-red-50">🗑️ Clear {year}</button>
          )}
        </div>
        <div className="mt-2 text-xs text-slate-400">
          {uploadMode==="sku"
            ? "SKU mode: HQ, Doctor Name, Month, Product Name, Qty — app computes PTR value"
            : "Value mode: HQ, Doctor Name, Apr, May, Jun… (monthly PTR values) — SKU upload overrides"}
        </div>
        <div className="flex gap-2 mt-2">
          <button onClick={downloadSampleSKU} className="px-3 py-1.5 bg-slate-100 text-slate-600 text-xs font-bold rounded-lg hover:bg-slate-200 border border-slate-200">
            📥 Sample SKU File
          </button>
          <button onClick={downloadSampleValue} className="px-3 py-1.5 bg-slate-100 text-slate-600 text-xs font-bold rounded-lg hover:bg-slate-200 border border-slate-200">
            📥 Sample Value File
          </button>
        </div>
      </div>

      {/* Filters */}
      <div className="flex flex-wrap gap-2 mb-4">
        <select value={hqFilter} onChange={e=>setHqFilter(e.target.value)}
          className="px-3 py-1.5 border border-slate-200 rounded-xl text-xs bg-white focus:outline-none">
          <option value="">All HQs</option>{HQ_LIST.map(h=><option key={h}>{h}</option>)}
        </select>
        <select value={monthFilter} onChange={e=>setMonthFilter(e.target.value)}
          className="px-3 py-1.5 border border-slate-200 rounded-xl text-xs bg-white focus:outline-none">
          <option value="">All Months</option>{MONTHS.map(m=><option key={m}>{m}</option>)}
        </select>
        {(hqFilter||monthFilter) && (
          <button onClick={()=>{setHqFilter("");setMonthFilter("");}} className="px-3 py-1.5 border border-slate-200 rounded-xl text-xs text-slate-400 hover:text-red-500 bg-white">✕ Clear</button>
        )}
        {uploadedMonths.length>0 && (
          <span className="px-3 py-1.5 bg-emerald-50 border border-emerald-100 rounded-xl text-xs text-emerald-700 font-semibold">
            Data available: {uploadedMonths.join(", ")}
          </span>
        )}
      </div>

      {displayMonths.length===0 ? (
        <div className="bg-white rounded-2xl border border-slate-100 shadow-sm p-12 text-center">
          <div className="text-4xl mb-3">📊</div>
          <p className="font-bold text-slate-400 mb-1">No sales data uploaded yet</p>
          <p className="text-xs text-slate-300">Upload an Excel file above to start tracking</p>
        </div>
      ) : (
        <div className="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="bg-slate-50 border-b border-slate-100">
                <tr>
                  <th className="px-3 py-2.5 text-left text-xs font-bold uppercase text-slate-400 sticky left-0 bg-slate-50">Doctor</th>
                  <th className="px-3 py-2.5 text-left text-xs font-bold uppercase text-slate-400">HQ</th>
                  <th className="px-3 py-2.5 text-left text-xs font-bold uppercase text-slate-400">Plan/mo</th>
                  {displayMonths.map(m => (
                    <th key={m} colSpan={3} className="px-3 py-2.5 text-center text-xs font-bold uppercase text-slate-400 border-l border-slate-200">{m}</th>
                  ))}
                  {displayMonths.length>1 && <th colSpan={3} className="px-3 py-2.5 text-center text-xs font-bold uppercase text-blue-400 border-l border-slate-200">Overall</th>}
                </tr>
                <tr className="border-b border-slate-100">
                  <th className="px-3 py-1.5 sticky left-0 bg-slate-50"></th>
                  <th className="px-3 py-1.5"></th>
                  <th className="px-3 py-1.5"></th>
                  {displayMonths.map(m=>(
                    <React.Fragment key={m}>
                      <th className="px-2 py-1.5 text-xs text-slate-400 font-semibold border-l border-slate-200">Plan</th>
                      <th className="px-2 py-1.5 text-xs text-slate-400 font-semibold">Actual</th>
                      <th className="px-2 py-1.5 text-xs text-slate-400 font-semibold">Ach%</th>
                    </React.Fragment>
                  ))}
                  {displayMonths.length>1 && (
                    <>
                      <th className="px-2 py-1.5 text-xs text-blue-400 font-semibold border-l border-slate-200">Plan</th>
                      <th className="px-2 py-1.5 text-xs text-blue-400 font-semibold">Actual</th>
                      <th className="px-2 py-1.5 text-xs text-blue-400 font-semibold">Ach%</th>
                    </>
                  )}
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-50">
                {doctors.map(doc => {
                  const key = doc.name+"___"+doc.hq;
                  const plan = doc.sales26;
                  let totalPlan=0, totalActual=0;
                  displayMonths.forEach(m=>{ totalPlan+=plan; totalActual+=getActual(key,m); });
                  const overallPct = pct(totalActual, totalPlan);
                  const hasAny = displayMonths.some(m=>getActual(key,m)>0);

                  return (
                    <tr key={key} className={`hover:bg-slate-50 ${!hasAny?"opacity-50":""}`}>
                      <td className="px-3 py-2.5 font-semibold text-slate-800 sticky left-0 bg-white text-xs">{doc.name}</td>
                      <td className="px-3 py-2.5 text-xs text-slate-400">{doc.hq}</td>
                      <td className="px-3 py-2.5 text-xs font-bold text-slate-600">{plan>0?inr(plan):<span className="text-slate-300">—</span>}</td>
                      {displayMonths.map(m=>{
                        const act = getActual(key,m);
                        const p   = pct(act, plan);
                        return (
                          <React.Fragment key={m}>
                            <td className="px-2 py-2.5 text-xs text-slate-500 border-l border-slate-100">{plan>0?inr(plan):"—"}</td>
                            <td className="px-2 py-2.5 text-xs font-bold text-slate-700">{act>0?inr(act):<span className="text-slate-300">—</span>}</td>
                            <td className="px-2 py-2.5">
                              {p!==null ? (
                                <span className={`px-1.5 py-0.5 rounded-full text-xs font-bold ${achColor(p)}`}>{p}%</span>
                              ):<span className="text-slate-200 text-xs">—</span>}
                            </td>
                          </React.Fragment>
                        );
                      })}
                      {displayMonths.length>1 && (
                        <>
                          <td className="px-2 py-2.5 text-xs font-bold text-blue-600 border-l border-slate-100">{inr(totalPlan)}</td>
                          <td className="px-2 py-2.5 text-xs font-bold text-slate-800">{totalActual>0?inr(totalActual):"—"}</td>
                          <td className="px-2 py-2.5">
                            {overallPct!==null&&totalActual>0?(
                              <div>
                                <span className={`px-1.5 py-0.5 rounded-full text-xs font-bold ${achColor(overallPct)}`}>{overallPct}%</span>
                                <div className="text-xs mt-0.5 font-semibold" style={{fontSize:"9px"}}>{achLabel(overallPct)}</div>
                              </div>
                            ):<span className="text-slate-200 text-xs">—</span>}
                          </td>
                        </>
                      )}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Legend */}
      <div className="flex gap-3 mt-3 flex-wrap">
        {[["bg-purple-100 text-purple-700","🏆 Exceptional (100%+)"],["bg-emerald-100 text-emerald-700","🌟 Excellent (90-99%)"],["bg-blue-100 text-blue-700","✅ Good (80-89%)"],["bg-red-100 text-red-600","⚠️ Below 80%"]].map(([cls,lbl])=>(
          <span key={lbl} className={`px-2 py-1 rounded-lg text-xs font-bold ${cls}`}>{lbl}</span>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
